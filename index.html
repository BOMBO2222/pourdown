        function getTodayKey() {
            let d = new Date(); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        }
        function loadDailyMissions() {
            let saved = JSON.parse(localStorage.getItem('pourDownMissions') || 'null');
            if (!saved || saved.day !== getTodayKey()) {
                // Yeni gün → 3 rastgele görev seç
                let pool = [...missionPool].sort(() => Math.random() - 0.5).slice(0, 3);
                saved = { day: getTodayKey(), missions: pool.map(m => ({ ...m, progress: 0, done: false })) };
                localStorage.setItem('pourDownMissions', JSON.stringify(saved));
            }
            return saved.missions;
        }
        function saveDailyMissions() {
            localStorage.setItem('pourDownMissions', JSON.stringify({ day: getTodayKey(), missions: dailyMissions }));
        }

        function updateMissions(event, data) {
            let changed = false;
            dailyMissions.forEach(m => {
                if (m.done) return;
                if (m.type === 'level'  && event === 'level_complete' && gameState.level >= m.target)
                    { m.progress = gameState.level; }
                if (m.type === 'combo'  && event === 'level_complete' && comboCount >= m.target)
                    { m.progress = comboCount; }
                if (m.type === 'score'  && event === 'level_complete' && gameState.score >= m.target)
                    { m.progress = gameState.score; }
                if (m.type === 'speed'  && event === 'speed_level'   ) { m.progress++; }
                if (m.type === 'saver'  && event === 'saver_level'   ) { m.progress++; }
                if (!m.done && m.progress >= m.target) {
                    m.done = true; changed = true;
                    gameState.score += m.bonus;
                    toastQueue.push({ icon: m.icon, name: 'GÖREV TAMAM!', desc: m.text + ' (+' + m.bonus + ' puan)', timer: 220 });
                }
            });
            if (changed) saveDailyMissions();
        }

        function unlockAchievement(id) {
            // BAŞARIM SİSTEMİ GİZLENDİ - kullanıcı isteğiyle.
            // İlerleyen sürümlerde geri açılabilir; veriyi yine de kaydediyoruz, sadece UI'da göstermiyoruz.
            if (unlockedAchievements.includes(id)) return;
            unlockedAchievements.push(id);
            localStorage.setItem('pourDownAchievements', JSON.stringify(unlockedAchievements));
            // toast push devre dışı - başarım açma popup'ı görünmez artık
            // let def = achievementDefs.find(a => a.id === id);
            // if (def) toastQueue.push({ ...def, timer: 200 });
        }

        function checkAchievements(event, data) {
            if (event === 'pour_start') { unlockAchievement('first_pour'); }
            if (event === 'level_complete') {
                let lvl = gameState.level;
                if (lvl >= 5)  unlockAchievement('level5');
                if (lvl >= 10) unlockAchievement('level10');
                if (lvl >= 20) unlockAchievement('level20');
                if (lvl >= 50) unlockAchievement('level50');
                if (data && data.fillPct >= 95) {
                    unlockAchievement('perfect');
                    perfectStreak++;
                    if (perfectStreak >= 5) unlockAchievement('fire5');
                } else { perfectStreak = 0; }
                if (Date.now() - levelStartTime < 5000) unlockAchievement('speed');
                if (lvl >= 5 && gameState.totalLiquid >= 80) unlockAchievement('saver');
                let themeIdx = Math.floor((lvl - 1) / 5) % 6;
                seenThemes.add(themeIdx);
                if (seenThemes.size >= 6) unlockAchievement('rainbow');
            }
        }

        function isInsideRect(x, y, rect) {
            return x >= rect.x - rect.w/2 && x <= rect.x + rect.w/2 &&

        }

            let dx = x - circle.x;
            let dy = y - circle.y;
            return dx*dx + dy*dy <= circle.r * circle.r;
        }

            let x = (clientX - rect.left) * (canvas.width / rect.width);
            let y = (clientY - rect.top) * (canvas.height / rect.height);
            return { x, y };

        // Web Audio API
        let audioCtx = null;
        let masterGain = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.7;  // Tüm seslerin global ses seviyesi
                masterGain.connect(audioCtx.destination);
            }
        }
        
        function playDing() {
            if (!audioCtx || !gameState.soundEnabled) return;
            const t = audioCtx.currentTime;
            
            // Tok bas vuruş
            const sub = audioCtx.createOscillator();
            const subGain = audioCtx.createGain();
            sub.type = 'sine';
            sub.frequency.setValueAtTime(220, t);
            sub.frequency.exponentialRampToValueAtTime(110, t + 0.08);
            subGain.gain.setValueAtTime(0, t);
            subGain.gain.linearRampToValueAtTime(0.5, t + 0.005);
            subGain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
            sub.connect(subGain); subGain.connect(masterGain);
            sub.start(t); sub.stop(t + 0.2);
            
            // Üst parlak ton (E5 — canlı his)
            const top = audioCtx.createOscillator();
            const topGain = audioCtx.createGain();
            const topFilt = audioCtx.createBiquadFilter();
            top.type = 'triangle';
            top.frequency.value = 659.25;  // E5
            topFilt.type = 'lowpass';
            topFilt.frequency.value = 2500;
            topGain.gain.setValueAtTime(0, t);
            topGain.gain.linearRampToValueAtTime(0.32, t + 0.008);
            topGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
            top.connect(topFilt); topFilt.connect(topGain); topGain.connect(masterGain);
            top.start(t); top.stop(t + 0.27);
        }

        // Pürüzsüz Su Sesi (Sadece saf su akıntısı hissi)
        function startPourSound() {
            if (!audioCtx || !gameState.soundEnabled || pourNoiseNode) return;

            // ─── KATMAN 1: PEMBE GÜRÜLTÜ TABANI (ana akış sesi) ───
            const bufSize = audioCtx.sampleRate * 2;
            const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
            for (let i = 0; i < bufSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                d[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                d[i] *= 0.12;
                b6 = white * 0.115926;
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buf; src.loop = true;

            // Tema tipine göre filtre frekansı seç (akış karakteri)
            let _themeIdx = Math.floor((gameState.level - 1) / 5) % themes.length;
            let baseFreq = 1400;
            if (_themeIdx === 0) baseFreq = 1600;        // Su: temiz, parlak
            else if (_themeIdx === 1) baseFreq = 700;    // Lav: derin, boğuk
            else if (_themeIdx === 2) baseFreq = 2200;   // Zehir: tiz, sislenmiş
            else if (_themeIdx === 3) baseFreq = 1200;   // Altın: orta, metalik
            else if (_themeIdx === 4) baseFreq = 900;    // Kan: kalın, ağır
            else if (_themeIdx === 5) baseFreq = 1800;   // Gece: hayalet gibi

            const filt = audioCtx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.value = baseFreq;
            filt.Q.value = 0.7;

            // ─── KATMAN 2: HAFİF YÜKSEK FREKANS PARILTI (su damlacığı dokusu) ───
            const sparkleBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
            const sd = sparkleBuf.getChannelData(0);
            for (let i = 0; i < sd.length; i++) {
                sd[i] = (Math.random() * 2 - 1) * 0.3;
            }
            const sparkleSrc = audioCtx.createBufferSource();
            sparkleSrc.buffer = sparkleBuf; sparkleSrc.loop = true;
            const sparkleFilt = audioCtx.createBiquadFilter();
            sparkleFilt.type = 'bandpass';
            sparkleFilt.frequency.value = 4500;
            sparkleFilt.Q.value = 1.2;
            const sparkleGain = audioCtx.createGain();
            sparkleGain.gain.value = 0.04;
            sparkleSrc.connect(sparkleFilt); sparkleFilt.connect(sparkleGain); sparkleGain.connect(masterGain);

            // ─── KATMAN 3: HAFİF DERİN UĞULTU (alt-bas, doluluk hissi) ───
            const lowOsc = audioCtx.createOscillator();
            const lowGain = audioCtx.createGain();
            lowOsc.type = 'sine';
            lowOsc.frequency.value = 80 + _themeIdx * 8; // tema göre küçük varyasyon
            lowGain.gain.value = 0.05;
            lowOsc.connect(lowGain); lowGain.connect(masterGain);

            // Ana gain
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.32, audioCtx.currentTime + 0.12);
            src.connect(filt); filt.connect(g); g.connect(masterGain);

            src.start();
            sparkleSrc.start();
            lowOsc.start();

            // Eğim/şiddete göre dinamik
            const setIntensity = function(intensity) {
                if (!g) return;
                // Ana gürültü
                const targetGain = 0.18 + intensity * 0.28;
                g.gain.linearRampToValueAtTime(targetGain, audioCtx.currentTime + 0.05);
                // Filtre yüksek-frekansını eğime göre aç (akış hızlanmış hissi)
                const filtTarget = baseFreq + intensity * 800;
                filt.frequency.linearRampToValueAtTime(filtTarget, audioCtx.currentTime + 0.08);
                // Pırıltı katmanı şiddetle artar
                sparkleGain.gain.linearRampToValueAtTime(0.02 + intensity * 0.06, audioCtx.currentTime + 0.08);
            };

            pourNoiseNode = {
                src, g, filt, sparkleSrc, sparkleGain, lowOsc, lowGain, setIntensity
            };
        }

        function stopPourSound() {
            if (!pourNoiseNode) return;
            try {
                const t = audioCtx.currentTime;
                pourNoiseNode.g.gain.linearRampToValueAtTime(0, t + 0.25);
                pourNoiseNode.sparkleGain.gain.linearRampToValueAtTime(0, t + 0.25);
                pourNoiseNode.lowGain.gain.linearRampToValueAtTime(0, t + 0.25);
                pourNoiseNode.src.stop(t + 0.3);
                pourNoiseNode.sparkleSrc.stop(t + 0.3);
                pourNoiseNode.lowOsc.stop(t + 0.3);
            } catch(e) {}
            pourNoiseNode = null;
        }

        // ════════════════════════════════════════════════════════
        //  GENERATİF AMBIENT MÜZİK (her temaya uygun atmosfer)
        // ════════════════════════════════════════════════════════
        let musicNode = null;
        let musicNoteTimer = 0;
        let musicCurrentTheme = -1;

        // Tema-spesifik nota seti (pentatonik scale'ler)
        const themeMusic = [
            { scale: [261.63, 293.66, 329.63, 392.00, 440.00], wave: 'sine',     filter: 1200 }, // Su: C major pentatonik
            { scale: [220.00, 246.94, 277.18, 329.63, 369.99], wave: 'triangle', filter: 700  }, // Lav: A minor pentatonik (karanlık)
            { scale: [293.66, 329.63, 369.99, 440.00, 493.88], wave: 'sine',     filter: 1500 }, // Zehir: D major pentatonik (tedirgin)
            { scale: [349.23, 392.00, 440.00, 523.25, 587.33], wave: 'triangle', filter: 1100 }, // Altın: F major pentatonik (parlak)
            { scale: [196.00, 220.00, 246.94, 293.66, 329.63], wave: 'triangle', filter: 600  }, // Kan: G minor pentatonik (kasvetli)
            { scale: [277.18, 311.13, 349.23, 415.30, 466.16], wave: 'sine',     filter: 1300 }, // Gece: C# minor pentatonik (büyülü)
        ];

        function startMusic() {
            if (!audioCtx || !gameState.musicEnabled || musicNode) return;
            // Generic master gain for music
            const mGain = audioCtx.createGain();
            mGain.gain.value = 0; // başta sessiz
            mGain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 1.5);
            mGain.connect(masterGain);
            musicNode = { mGain, lastNoteTime: 0 };
        }

        function stopMusic() {
            if (!musicNode) return;
            try {
                musicNode.mGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            } catch(e) {}
            setTimeout(() => { musicNode = null; }, 600);
        }

        function tickMusic() {
            if (!musicNode || !audioCtx || !gameState.musicEnabled) return;
            const now = audioCtx.currentTime;
            // Her 1.6 saniyede bir nota çal
            if (now - musicNode.lastNoteTime < 1.6 + Math.random() * 0.6) return;
            musicNode.lastNoteTime = now;

            let themeIdx = Math.floor((gameState.level - 1) / 5) % themes.length;
            let m = themeMusic[themeIdx];
            let freq = m.scale[Math.floor(Math.random() * m.scale.length)];
            // Bazen bir oktav yukarı veya aşağı
            if (Math.random() < 0.3) freq *= 2;
            else if (Math.random() < 0.2) freq *= 0.5;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filt = audioCtx.createBiquadFilter();
            osc.type = m.wave;
            osc.frequency.value = freq;
            filt.type = 'lowpass';
            filt.frequency.value = m.filter;
            filt.Q.value = 0.6;

            // Yumuşak attack/release (ambient hissi)
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.7, now + 0.4);
            gain.gain.linearRampToValueAtTime(0, now + 2.8);
            osc.connect(filt); filt.connect(gain); gain.connect(musicNode.mGain);
            osc.start(now); osc.stop(now + 3.0);
        }

        // Sıçrama sesi
        function playSplash() {
            if (!audioCtx || !gameState.soundEnabled) return;
            const t = audioCtx.currentTime;
            
            // Bloop (suya damla)
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filt = audioCtx.createBiquadFilter();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(520, t);
            osc.frequency.exponentialRampToValueAtTime(220, t + 0.08);
            filt.type = 'lowpass';
            filt.frequency.value = 1200;
            filt.Q.value = 2;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.28, t + 0.005);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
            osc.connect(filt); filt.connect(gain); gain.connect(masterGain);
            osc.start(t); osc.stop(t + 0.14);
            
            // Kısa filtreli noise (damla doku)
            const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
            const noiseData = noiseBuf.getChannelData(0);
            for (let i = 0; i < noiseData.length; i++) {
                noiseData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (noiseData.length * 0.3));
            }
            const noiseSrc = audioCtx.createBufferSource();
            const noiseGain = audioCtx.createGain();
            const noiseFilt = audioCtx.createBiquadFilter();
            noiseSrc.buffer = noiseBuf;
            noiseFilt.type = 'bandpass';
            noiseFilt.frequency.value = 900;
            noiseFilt.Q.value = 1.5;
            noiseGain.gain.setValueAtTime(0.18, t);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
            noiseSrc.connect(noiseFilt); noiseFilt.connect(noiseGain); noiseGain.connect(masterGain);
            noiseSrc.start(t); noiseSrc.stop(t + 0.08);
        }

        // Kombo sesi — artan tonlar
        function playComboSound(level) {
            if (!audioCtx || !gameState.soundEnabled) return;
            const t = audioCtx.currentTime;
            
            // C major pentatonik yükselen — her vuruşta bir nota daha yukarı
            // C4, E4, G4, C5, E5 — her seferinde daha tatmin edici
            const baseFreqs = [261.63, 329.63, 392.00, 523.25, 659.25];
            const subFreqs  = [130.81, 164.81, 196.00, 261.63, 329.63];  // bir oktav alt
            const count = Math.min(level, baseFreqs.length);
            
            for (let i = 0; i < count; i++) {
                const startT = t + i * 0.09;
                
                // Tok bas tabanı
                const sub = audioCtx.createOscillator();
                const subGain = audioCtx.createGain();
                const subFilt = audioCtx.createBiquadFilter();
                sub.type = 'sine';
                sub.frequency.setValueAtTime(subFreqs[i] * 1.4, startT);
                sub.frequency.exponentialRampToValueAtTime(subFreqs[i], startT + 0.1);
                subFilt.type = 'lowpass';
                subFilt.frequency.value = 600;
                subGain.gain.setValueAtTime(0, startT);
                subGain.gain.linearRampToValueAtTime(0.32, startT + 0.005);
                subGain.gain.exponentialRampToValueAtTime(0.001, startT + 0.3);
                sub.connect(subFilt); subFilt.connect(subGain); subGain.connect(masterGain);
                sub.start(startT); sub.stop(startT + 0.32);
                
                // Üst canlı melodi notası
                const top = audioCtx.createOscillator();
                const topGain = audioCtx.createGain();
                const topFilt = audioCtx.createBiquadFilter();
                top.type = 'triangle';
                top.frequency.value = baseFreqs[i];
                topFilt.type = 'lowpass';
                topFilt.frequency.value = 2800;
                topGain.gain.setValueAtTime(0, startT);
                topGain.gain.linearRampToValueAtTime(0.28, startT + 0.008);
                topGain.gain.exponentialRampToValueAtTime(0.001, startT + 0.4);
                top.connect(topFilt); topFilt.connect(topGain); topGain.connect(masterGain);
                top.start(startT); top.stop(startT + 0.42);
                
                // Son vuruşa uzun gövde tail (kombo doruk hissi)
                if (i === count - 1) {
                    const body = audioCtx.createOscillator();
                    const bodyGain = audioCtx.createGain();
                    const bodyFilt = audioCtx.createBiquadFilter();
                    body.type = 'sine';
                    body.frequency.value = baseFreqs[i] * 1.5;  // 5'li üst harmoni
                    bodyFilt.type = 'lowpass';
                    bodyFilt.frequency.value = 2000;
                    bodyGain.gain.setValueAtTime(0, startT);
                    bodyGain.gain.linearRampToValueAtTime(0.14, startT + 0.05);
                    bodyGain.gain.exponentialRampToValueAtTime(0.001, startT + 1.0);
                    body.connect(bodyFilt); bodyFilt.connect(bodyGain); bodyGain.connect(masterGain);
                    body.start(startT); body.stop(startT + 1.05);
                }
            }
        }

        // Oyun bitti sesi — inen tonlar
        function playGameOverSound() {
            if (!audioCtx || !gameState.soundEnabled) return;
            const freqs = [523, 466, 392, 311];
            freqs.forEach((f, i) => {
                const t = audioCtx.currentTime + i * 0.25;
                
                const playTone = (freq, time, gainMult) => {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    const lp = audioCtx.createBiquadFilter();
                    lp.type = 'lowpass'; lp.frequency.value = 2000;
                    
                    const lfo = audioCtx.createOscillator();
                    const lfoGain = audioCtx.createGain();
                    lfo.type = 'sine'; lfo.frequency.value = 5;
                    lfoGain.gain.value = freq * 0.0017;
                    lfo.connect(lfoGain); lfoGain.connect(osc.detune);
                    
                    osc.type = 'triangle'; osc.frequency.value = freq;
                    
                    osc.connect(lp); lp.connect(g); g.connect(masterGain);
                    
                    g.gain.setValueAtTime(0, time);
                    g.gain.linearRampToValueAtTime(0.15 * gainMult, time + 0.03);
                    g.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
                    
                    osc.start(time); lfo.start(time);
                    osc.stop(time + 0.42); lfo.stop(time + 0.42);
                };
                
                playTone(f, t, 1);
                
                if (i === freqs.length - 1) {
                    playTone(f, t + 0.2, 0.4);
                }
            });
        }

        // Level up fanfare (Tatmin edici kristal çınlaması)
        function playLevelUpSound() {
            if (!audioCtx || !gameState.soundEnabled) return;
            const t = audioCtx.currentTime;
            
            // ═══ KATMAN 1: Tok bas vuruş ═══
            const sub = audioCtx.createOscillator();
            const subGain = audioCtx.createGain();
            const subFilt = audioCtx.createBiquadFilter();
            sub.type = 'sine';
            sub.frequency.setValueAtTime(165, t);
            sub.frequency.exponentialRampToValueAtTime(82, t + 0.15);
            subFilt.type = 'lowpass';
            subFilt.frequency.value = 500;
            subGain.gain.setValueAtTime(0, t);
            subGain.gain.linearRampToValueAtTime(0.55, t + 0.008);
            subGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
            sub.connect(subFilt); subFilt.connect(subGain); subGain.connect(masterGain);
            sub.start(t); sub.stop(t + 0.45);
            
            // ═══ KATMAN 2: Yükselen majör arpej (canlı, başarı hissi) ═══
            // C major arpej: C4 → E4 → G4 → C5 hızlı çıkış
            const arpFreqs = [261.63, 329.63, 392.00, 523.25];  // C4 E4 G4 C5
            arpFreqs.forEach((freq, i) => {
                const startT = t + i * 0.05;  // hızlı arpej
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filt = audioCtx.createBiquadFilter();
                
                osc.type = 'triangle';
                osc.frequency.value = freq;
                
                filt.type = 'lowpass';
                filt.frequency.value = 3000;
                filt.Q.value = 0.7;
                
                const peakGain = 0.30 - i * 0.03;  // ilk notalar daha yüksek
                gain.gain.setValueAtTime(0, startT);
                gain.gain.linearRampToValueAtTime(peakGain, startT + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, startT + 0.7);
                
                osc.connect(filt); filt.connect(gain); gain.connect(masterGain);
                osc.start(startT); osc.stop(startT + 0.75);
            });
            
            // ═══ KATMAN 3: Sustained C major akor gövde (oda dolum) ═══
            // C major triad pad — tüm notalar aynı anda, uzun yumuşak tail
            const padFreqs = [261.63, 329.63, 392.00];  // C4 E4 G4
            padFreqs.forEach(freq => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filt = audioCtx.createBiquadFilter();
                
                osc.type = 'sine';
                osc.frequency.value = freq;
                
                filt.type = 'lowpass';
                filt.frequency.value = 1800;
                
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.10, t + 0.15);  // yumuşak giriş
                gain.gain.linearRampToValueAtTime(0.08, t + 0.6);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 1.4);
                
                osc.connect(filt); filt.connect(gain); gain.connect(masterGain);
                osc.start(t); osc.stop(t + 1.5);
            });
        }

        // Adım 4: Tur Atlama (Level Up)
        function levelUp() {
            gameState.isTransitioning = true;
            stopPourSound();

            // === GÜÇLENDİRİLMİŞ PUAN SİSTEMİ ===
            let fillPct = targetCup.fill;
            let elapsed = (Date.now() - levelStartTime) / 1000;
            let baseScore = 100 + gameState.level * 25;
            let fillBonus = Math.round((fillPct / 100) * 150);
            let timeBonus = elapsed < 4 ? 100 : elapsed < 7 ? 50 : 0;
            // Mükemmel doluluk için bonus
            let perfectBonus = fillPct >= 98 ? 200 : 0;

            // Kombo: 88%+ doluluk
            let prevCombo = comboCount;
            if (fillPct >= 88) {
                comboCount++;
            } else {
                if (comboCount >= 2) {
                    // Combo BREAK — popup
                    comboPopups.push({
                        text: 'MISS!',
                        subtext: prevCombo + ' COMBO BROKE',
                        color: [220, 80, 80],
                        timer: 90, scale: 1.0, vy: -1
                    });
                }
                comboCount = 0;
            }
            // Yeni multiplier: 1, 1.5, 2, 3, 4
            comboMultiplier = comboCount >= 10 ? 4 : comboCount >= 5 ? 3 : comboCount >= 3 ? 2 : comboCount >= 2 ? 1.5 : 1;

            // Combo popup tetikle
            if (comboCount >= 2 && comboCount > prevCombo) {
                let cText, cColor, cIcon;
                if (comboCount >= 10) { cText = 'ON FIRE!'; cColor = [255, 60, 60]; cIcon = '🔥🔥'; }
                else if (comboCount >= 5) { cText = 'PERFECT!'; cColor = [255, 80, 80]; cIcon = '🔥'; }
                else if (comboCount >= 3) { cText = 'GREAT!'; cColor = [255, 160, 20]; cIcon = '⚡'; }
                else { cText = 'GOOD!'; cColor = [255, 215, 0]; cIcon = '✨'; }
                comboPopups.push({
                    text: cIcon + ' ' + cText,
                    subtext: 'x' + comboMultiplier + ' COMBO',
                    color: cColor,
                    timer: 100, scale: 1.0, vy: -1.5
                });
            }

            let turnScore = Math.round((baseScore + fillBonus + timeBonus + perfectBonus) * comboMultiplier);
            gameState.score += turnScore;
            // Skor zıplama animasyonu için
            window.scorePulse = 1.4;

            // Tema değişimi tespiti
            let oldThemeIdx = Math.floor((gameState.level - 1) / 5) % themes.length;
            gameState.level++;
            let newThemeIdx = Math.floor((gameState.level - 1) / 5) % themes.length;

            if (oldThemeIdx !== newThemeIdx) {
                // Yeni tema → flash + isim
                themeFlashTimer = 60; // 60 frame ekran beyaz hafif yansıması
                themeAnnounceTimer = 120; // 2 saniye tema ismi göster
                themeAnnounceData = {
                    name: themes[newThemeIdx].name,
                    icon: themes[newThemeIdx].icon
                };
            }

            // 1. TİTREŞİM
            if (navigator.vibrate) navigator.vibrate([30, 20, 30]);

            // 2. BARDAK PULSE ANİMASYONU
            targetCup.scale = 1.15;

            // 3. SES
            if (comboCount >= 2) playComboSound(comboCount);
            else playLevelUpSound();

            // 4. BAŞARIM + GÖREV KONTROLÜ
            checkAchievements('level_complete', { fillPct });
            updateMissions('level_complete', {});
            if (elapsed < 5)  updateMissions('speed_level', {});
            if (gameState.totalLiquid >= 60) { saverTurns++; updateMissions('saver_level', {}); }
            else saverTurns = 0;
            levelStartTime = Date.now();

            let lq = currentTheme.liquid;
            // 5. IŞIK PATLAMASI — POOL
            for(let i=0; i<6; i++) {
                let _b = particlePool.getBurst();
                _b.x = targetCup.x + (Math.random() - 0.5) * targetCup.w * 0.8;
                _b.y = targetCup.y - targetCup.h/2 + 10;
                _b.vy = -15 - Math.random() * 15;
                _b.h = 50 + Math.random() * 50;
                _b.alpha = 1.0;
                _b.color = [lq[0], lq[1], lq[2]];
                burstLines.push(_b);
            }

            // 6. PARÇACIKLAR — POOL
            for(let i=0; i<15; i++) {
                let _e = particlePool.getExplosion();
                _e.x = targetCup.x + (Math.random() - 0.5) * 20;
                _e.y = targetCup.y - targetCup.h/2 + 10;
                _e.vx = (Math.random() - 0.5) * 8;
                _e.vy = -4 - Math.random() * 6;
                _e.alpha = 1.0;
                _e.r = 3 + Math.random() * 3;
                _e.color = [lq[0], lq[1], lq[2]];
                explosionParticles.push(_e);
            }

            // 7. +SKOR YAZISI (puan + kombo göster) — POOL
            let scoreLabel = '+' + turnScore;
            if (comboMultiplier > 1) scoreLabel += '  x' + comboMultiplier;
            let _ft = particlePool.getFloat();
            _ft.text = scoreLabel;
            _ft.x = targetCup.x;
            _ft.y = targetCup.y - targetCup.h/2 - 20;
            _ft.alpha = 1.0;
            floatingTexts.push(_ft);

            // Kamerayı alt bardağa doğru kaydır (180px)
            targetCameraY = -180;

            // 800ms bekleyip yeni tura geçiyoruz (böylece doluluk anı kısaca görünüyor)
            setTimeout(() => {
                isDragging = false; // Farenin takılı kalmasını önle
                cameraY = 0;
                targetCameraY = 0;
                
                // Eski alt bardak, yeni üst bardak oluyor (yatay konumu korunur)
                topCup.x = targetCup.x;
                topCup.angle = 0;
                // GDD: Bir sonraki turun başlangıcı = o ana kadar kalan toplam sıvı
                topCup.fill = Math.round(gameState.totalLiquid);
                streamParticles.length = 0; // Ekrandaki kalan damlaları temizle
                splashParticles.length = 0;
                ripples.length = 0;

                initLevel(); // Yeni bardak konumları ve zorluk
                gameState.isTransitioning = false;
            }, 800);
        }

        // Tur başlangıç ayarları
        function initLevel() {
            topCup.angle = 0;
            
            // Zorluk Sistemi: Üst bardak bulunduğun seviyeyi temsil eder
            let shrinkW_top = (gameState.level - 1) * 1.0; // Eskiden 2.0 idi, yarı yarıya yavaş küçülecek
            let shrinkH_top = (gameState.level - 1) * 1.25; // Eskiden 2.5 idi
            topCup.w = Math.max(35, 90 - shrinkW_top); 
            topCup.h = Math.max(45, 110 - shrinkH_top);

            // Alt bardak ise hedefi temsil eder (bir sonraki seviye, yani daha küçük)
            let shrinkW_target = gameState.level * 1.0;
            let shrinkH_target = gameState.level * 1.25;
            targetCup.w = Math.max(35, 90 - shrinkW_target); 
            targetCup.h = Math.max(45, 110 - shrinkH_target);

            // === BARDAK ŞEKLİ — TEMAYA BAĞLI (her 5 levelde tema değişir) ===
            // Tema değişince bardak şekli de değişir, görsel olarak temayla uyumlu olur.
            // Önemli: w (çarpışma alanı) değişmiyor, sadece topW/botW (görsel) değişiyor.
            let topThemeIdx = Math.floor((gameState.level - 1) / 5) % themes.length;
            let targetThemeIdx = Math.floor(gameState.level / 5) % themes.length;

            let topNewShape = themes[topThemeIdx].shape || 'normal';
            let targetNewShape = themes[targetThemeIdx].shape || 'normal';

            if (targetNewShape !== (targetCup.shape || 'normal') && gameState.level > 1) {
                const shapeNames = { normal: 'Trapez', cylinder: 'Silindir', wide: 'Geniş', reverse: 'Ters Trapez', honey: 'Bal Küpü', goblet: 'Kadeh', flask: 'Şişe', volcano: 'Kâse', mystic: 'Kristal' };
                let tName = shapeNames[targetNewShape] || 'Yeni';
                toastQueue.push({ icon: '🏺', name: 'YENİ BARDAK!', desc: tName + ' şekli aktif', timer: 200 });
            }

            topCup.shape = topNewShape;
            targetCup.shape = targetNewShape;

            // Hareket hızı: Dengeli artış - ilk leveller daha akıcı, ileri leveller fırlamayan kontrollü artış
            if (gameState.level === 1) {
                // Level 1: hareket yok, kullanıcı öğreniyor
                targetCup.maxSpeed = 0;
                targetCup.speed = 0;
            } else if (gameState.level <= 5) {
                // Level 2-5: hızlı başlangıç, eğlenceli ritim
                // Tempo %19 hızlandığı için bardak hızı %15 düşürüldü (net etki: ~+%4 hızlanma, zorluk azalır)
                targetCup.maxSpeed = 0.17 + (gameState.level - 1) * 0.085;
                targetCup.speed = targetCup.maxSpeed * 0.5;
            } else if (gameState.level <= 15) {
                // Level 6-15: yumuşak artış
                targetCup.maxSpeed = 0.51 + (gameState.level - 5) * 0.051;
                targetCup.speed = targetCup.maxSpeed * 0.5;
            } else {
                // Level 16+: daha yavaş artış, zor ama yenilebilir kalsın
                targetCup.maxSpeed = Math.min(2.1, 1.02 + (gameState.level - 15) * 0.025);
                targetCup.speed = targetCup.maxSpeed * 0.5;
            }
            
            // GDD: Üst bardaktan 180px aşağıda
            targetCup.y = topCup.y + 180;
            
            // GDD: Sağda veya solda (rastgele)
            let side = Math.random() < 0.5 ? -1 : 1;
            
            // Doldurma açısı (fizik) göz önüne alınarak hesaplanan KUSURSUZ aralık
            // İlk damla dik açıyla dökülür (w/2)
            let firstDropX = targetCup.w / 2;
            // Son damla yaklaşık 68-75 derece eğimde dökülür. (30px yatay düşüş hızı payı)
            let lastDropX = (targetCup.w / 2) * 0.37 + (targetCup.h / 2) * 0.92 + 30;
            
            let minOffsetX = lastDropX - targetCup.w / 2 + 8; // +8 güvenli bölge
            let maxOffsetX = firstDropX + targetCup.w / 2 - 8;
            
            if (maxOffsetX < minOffsetX) {
                let ideal = (minOffsetX + maxOffsetX) / 2;
                minOffsetX = ideal;
                maxOffsetX = ideal;
            }
            
            // Şekil flask ise dipte 1.15x genişlik var, duvar payı için bunu hesaba kat
            let visualHalfW = targetCup.w / 2;
            if (targetCup.shape === 'flask') visualHalfW *= 1.15;

            let newX;
            if (gameState.level === 1) {
                // Level 1: kullanıcı yeni öğreniyor — eski yakın spawn mantığı kalsın (hareket yok zaten)
                let offsetX = minOffsetX + Math.random() * (maxOffsetX - minOffsetX);
                newX = topCup.x + (side * offsetX);
                if (newX - visualHalfW < 10 || newX + visualHalfW > canvas.width - 10) {
                    side = side * -1;
                    newX = topCup.x + (side * offsetX);
                }
            } else {
                // Level 2+: HAREKETLİ mod — tüm ekranda gerçekten rastgele spawn
                // Bu sayede çeşitlilik artar, bardak bazen yakında bazen uzakta çıkar.
                // Sınır: ekranın kenarlarından visualHalfW + 10 piksel uzakta kalsın (taşmasın)
                let minX = visualHalfW + 10;
                let maxX = canvas.width - visualHalfW - 10;
                // Üst bardakla TAM ÜST ÜSTE olmasın diye min 60px mesafe bırak
                // (çok yakın olursa oyun anlamsız olur, dökmeden başka bardağa geçer)
                let minDistance = 60;
                let attempts = 0;
                do {
                    newX = minX + Math.random() * (maxX - minX);
                    attempts++;
                } while (Math.abs(newX - topCup.x) < minDistance && attempts < 10);
                // 10 deneme sonunda hala uygun yer yoksa zorla bir tarafa it
                if (Math.abs(newX - topCup.x) < minDistance) {
                    newX = topCup.x + (Math.random() < 0.5 ? -minDistance : minDistance);
                    newX = Math.max(minX, Math.min(maxX, newX));
                }
                side = (newX < topCup.x) ? -1 : 1;
            }
            let halfW = targetCup.w / 2; // çarpışma için sabit halfW
            targetCup.x = clamp(newX, visualHalfW + 10, canvas.width - visualHalfW - 10);
            targetCup.dir = side; // Hareket yönü
            
            targetCup.fill = 0; 
        }

        // Oyunu başlat
        initLevel();

        let isDragging = false;
        let startX = 0;
        let targetAngle = 0;

        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }

        // Ortak Kontroller
        window.addEventListener('mousedown', (e) => handlePointerDown(e), { passive: false });
        window.addEventListener('touchstart', (e) => handlePointerDown(e), { passive: false });
        
        function handlePointerDown(e) {

                            gameState.totalLiquid = bonus;

                            gameState.state = 'PLAYING';

                if (isInsideRect(pos.x, pos.y, btnReplay)) {
                    gameState.state = 'PLAYING';
                    gameState.level = 1;
                    gameState.score = 0;

                    gameState.isNewHighScore = false;

                    adSystem.reset();
                    streamParticles.length = 0;
                    splashParticles.length = 0;

                    if (window.streamDrops) window.streamDrops.length = 0;
                    perfectStreak = 0;
                    seenThemes = new Set();
                    comboCount = 0;

                    currentTheme.bgInner = [...themes[0].bgInner];
                    currentTheme.bgOuter = [...themes[0].bgOuter];
                    currentTheme.liquid = [...themes[0].liquid];
                    lastThemeIndex = 0;
                    themeRings.length = 0;
                    burstLines.length = 0;

                    if (typeof comboPopups !== 'undefined') comboPopups.length = 0;
                    initLevel();
                } else if (isInsideRect(pos.x, pos.y, btnGameOverMenu)) {
                    gameState.state = 'MENU';
                    gameState.level = 1;
                    gameState.score = 0;
                    gameState.isNewHighScore = false;
                    adSystem.reset();
                    streamParticles.length = 0;
                    splashParticles.length = 0;
                    ripples.length = 0;
                    if (window.streamDrops) window.streamDrops.length = 0;
                    perfectStreak = 0;
                    seenThemes = new Set();
                    comboCount = 0;
                    comboMultiplier = 1;
                    saverTurns = 0;
                    levelStartTime = Date.now();
                    currentTheme.bgInner = [...themes[0].bgInner];
                    currentTheme.bgOuter = [...themes[0].bgOuter];
                    currentTheme.liquid = [...themes[0].liquid];
                    lastThemeIndex = 0;
                    themeRings.length = 0;
                    burstLines.length = 0;
                    explosionParticles.length = 0;
                    floatingTexts.length = 0;
                    if (typeof comboPopups !== 'undefined') comboPopups.length = 0;
                }
                return;
            }
            if (gameState.state === 'PAUSED') {

                if (btnReplayPause && isInsideRect(pos.x, pos.y, btnReplayPause)) {
                    // Tekrar oyna: level 1'den
                    gameState.state = 'PLAYING';
                    gameState.level = 1;
                    gameState.score = 0;
                    gameState.totalLiquid = 100;
                    gameState.isNewHighScore = false;
                    topCup.fill = 100;
                    targetCup.fill = 0;
                    targetCup.waveImpact = 0;
                    isDragging = false;
                    adSystem.reset();
                    streamParticles.length = 0;
                    splashParticles.length = 0;
                    ripples.length = 0;
                    if (window.streamDrops) window.streamDrops.length = 0;
                    perfectStreak = 0;
                    seenThemes = new Set();
                    comboCount = 0;
                    comboMultiplier = 1;
                    comboPopups.length = 0;
                    saverTurns = 0;
                    levelStartTime = Date.now();
                    currentTheme.bgInner = [...themes[0].bgInner];
                    currentTheme.bgOuter = [...themes[0].bgOuter];
                    currentTheme.liquid = [...themes[0].liquid];
                    lastThemeIndex = 0;
                    themeRings.length = 0;
                    burstLines.length = 0;
                    explosionParticles.length = 0;
                    floatingTexts.length = 0;
                    tutorialTimer = 220;
                    initLevel();
                    return;
                }
                if (isInsideRect(pos.x, pos.y, btnMainMenu)) {
                    gameState.state = 'MENU';
                    gameState.level = 1;
                    gameState.score = 0;
                    isDragging = false;
                    streamParticles.length = 0;
                    splashParticles.length = 0;
                    ripples.length = 0;
                    if (window.streamDrops) window.streamDrops.length = 0;
                    return;
                }
                if (btnSoundToggle && isInsideCircle(pos.x, pos.y, btnSoundToggle)) {
                    gameState.soundEnabled = !gameState.soundEnabled;
                    localStorage.setItem('pourDownSound', gameState.soundEnabled);
                    if (!gameState.soundEnabled) { stopPourSound(); stopTiltSound(); stopFillNearSound(); }
                    return;
                }
                if (btnMusicToggle && isInsideCircle(pos.x, pos.y, btnMusicToggle)) {
                    gameState.musicEnabled = !gameState.musicEnabled;
                    localStorage.setItem('pourDownMusic', gameState.musicEnabled);
                    if (!gameState.musicEnabled) stopMusic();
                    return;
                }
                return;
            }
            if (gameState.state === 'PLAYING') {
                if (isInsideCircle(pos.x, pos.y, btnPause)) {
                    gameState.state = 'PAUSED';
                    isDragging = false;
                    return;
                }
                isDragging = true;
                targetAngle = topCup.angle;
                // PERF/UX: hassasiyet artırıldı 0.6 → 1.0 (1px sürükleme = 1° eğim)
                // Daha az parmak hareketiyle daha iyi kontrol, özellikle mobilde
                startX = pos.x - (targetAngle / 1.0);
            }
        }

        window.addEventListener('mousemove', (e) => handlePointerMove(e), { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (isDragging && gameState.state === 'PLAYING') e.preventDefault();
            handlePointerMove(e);
        }, { passive: false });

        function handlePointerMove(e) {
            if (!isDragging || gameState.state !== 'PLAYING') return;
            let pos = getPointerPos(e);
            let dx = pos.x - startX;
            // UX: hassasiyet 0.6 → 1.0 (yukarıda startX hesabıyla aynı çarpan olmalı)
            targetAngle = clamp(dx * 1.0, -90, 90);
        }

        window.addEventListener('mouseup', () => { isDragging = false; targetAngle = 0; });
        window.addEventListener('touchend', () => { isDragging = false; targetAngle = 0; });

        // Bardak çizim fonksiyonu (İki bardak için de kullanılacak)
        function drawCup(cObj) {
            ctx.save();
            ctx.translate(cObj.x, cObj.y);
            
            // BARDAK PULSE ANİMASYONU
            cObj.scale = cObj.scale || 1.0;
            cObj.scale += (1.0 - cObj.scale) * 0.12; // Lerp ile küçülerek 1.0'a döner
            if (Math.abs(cObj.scale - 1.0) > 0.005) {
                ctx.scale(cObj.scale, cObj.scale);
            }

            if (cObj.angle) ctx.rotate(cObj.angle * Math.PI / 180);

            let w = cObj.w;
            let h = cObj.h;
            // === BARDAK ŞEKLİ SİSTEMİ ===
            let shape = cObj.shape || 'normal';
            let topW = w / 2; // her zaman sabit — sıvı buraya düşer
            let botW = topW * 0.85; // varsayılan
            
            // === SKIN RENKLERİ VE YANSIMALAR ===
            let strokeColor = 'rgba(255,255,255,0.7)';
            let fillBody = 'rgba(255,255,255,0.03)';
            let glowColor = 'transparent';
            let strokeW = 2.5;
            let glassHighlight = 'rgba(255,255,255,0.5)';
            let shadowColor = 'rgba(0,0,0,0.35)';

            if (shape === 'volcano') { // LAV
                botW = topW * 0.55;
                strokeColor = 'rgba(255, 120, 40, 0.9)';
                fillBody = 'rgba(255, 60, 0, 0.08)';
                glowColor = 'rgba(255, 80, 0, 0.5)';
                strokeW = 3;
                glassHighlight = 'rgba(255,180,100,0.6)';
            } else if (shape === 'flask') { // ZEHİR
                botW = topW * 1.15;
                strokeColor = 'rgba(100, 255, 100, 0.85)';
                fillBody = 'rgba(0, 255, 50, 0.06)';
                glowColor = 'rgba(0, 255, 50, 0.4)';
                glassHighlight = 'rgba(180,255,180,0.6)';
            } else if (shape === 'goblet') { // ALTIN
                botW = topW * 0.6; // kase dip genişliği
                strokeColor = 'rgba(255, 215, 0, 1)';
                fillBody = 'rgba(255, 200, 0, 0.1)';
                glowColor = 'rgba(255, 215, 0, 0.4)';
                strokeW = 3;
                glassHighlight = 'rgba(255,255,200,0.8)';
            } else if (shape === 'honey') { // BAL
                botW = topW * 1.25; // Tombul
                strokeColor = 'rgba(255, 180, 50, 0.8)'; 
                fillBody = 'rgba(255, 150, 0, 0.08)';
                glowColor = 'rgba(255, 150, 0, 0.3)';
                glassHighlight = 'rgba(255, 200, 100, 0.6)';
            } else if (shape === 'mystic') { // GECE
                botW = topW * 0.9;
                strokeColor = 'rgba(180, 120, 255, 0.9)';
                fillBody = 'rgba(130, 70, 255, 0.08)';
                glowColor = 'rgba(150, 80, 255, 0.6)';
                strokeW = 3;
                glassHighlight = 'rgba(220,180,255,0.7)';
            }

            let hh = h / 2;
            let r = 8;

            // Çekirdek yol fonksiyonu (hem clip hem stroke için)
            function buildCupPath() {
                ctx.beginPath();
                if (shape === 'honey') {
                    ctx.moveTo(-topW, -hh);
                    ctx.bezierCurveTo(-topW * 1.5, -hh / 2, -botW, hh, -topW * 0.7, hh);
                    ctx.lineTo(topW * 0.7, hh);
                    ctx.bezierCurveTo(botW, hh, topW * 1.5, -hh / 2, topW, -hh);
                } else if (shape === 'goblet') {
                    ctx.moveTo(-topW, -hh);
                    ctx.bezierCurveTo(-topW, 0, -botW, hh - r, -botW + r, hh);
                    ctx.lineTo(botW - r, hh);
                    ctx.bezierCurveTo(botW, hh - r, topW, 0, topW, -hh);
                } else if (shape === 'volcano') {
                    ctx.moveTo(-topW, -hh);
                    ctx.lineTo(-botW, hh - 2);
                    ctx.quadraticCurveTo(0, hh + 4, botW, hh - 2);
                    ctx.lineTo(topW, -hh);
                } else if (shape === 'mystic') {
                    ctx.moveTo(-topW, -hh);
                    ctx.lineTo(-topW - 8, -hh/2 + 10);
                    ctx.lineTo(-botW, hh - r);
                    ctx.quadraticCurveTo(-botW, hh, -botW + r, hh);
                    ctx.lineTo(botW - r, hh);
                    ctx.quadraticCurveTo(botW, hh, botW, hh - r);
                    ctx.lineTo(topW + 8, -hh/2 + 10);
                    ctx.lineTo(topW, -hh);
                } else {
                    ctx.moveTo(-topW, -hh);
                    ctx.lineTo(-botW, hh - r);
                    ctx.quadraticCurveTo(-botW, hh, -botW + r, hh);
                    ctx.lineTo(botW - r, hh);
                    ctx.quadraticCurveTo(botW, hh, botW, hh - r);
                    ctx.lineTo(topW, -hh);
                }
                ctx.closePath();
            }

            // 5. BARDAK ALT GÖLGE
            ctx.fillStyle = shadowColor;
            ctx.beginPath();
            let shadowY = (shape === 'goblet') ? hh + 45 : hh + 6;
            let shadowW = botW * 0.8;
            if (shape === 'honey') shadowW = topW * 0.8;
            ctx.ellipse(0, shadowY, shadowW, 5, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Cam gövde arka planı ve Clip Path
            ctx.save();
            buildCupPath();
            
            if (glowColor !== 'transparent') {
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 15 * _shadowScale;  // PERF: mobilde yarıya iner
            }
            ctx.fillStyle = fillBody;
            ctx.fill();
            ctx.shadowBlur = 0; // reset

            // Sıvıyı bardak sınırları içine kırp
            ctx.clip();

            // Eğer içinde sıvı varsa çiz
            if (cObj.fill > 0) {
                let fillH = (cObj.fill / 100) * h;
                let rad = (cObj.angle || 0) * Math.PI / 180;
                // tan değerini sınırla - 30'a yükseltildi (eski 20)
                // Bu sayede yüksek açıda da sıvı yüzeyi gerçekçi eğilir, sıvı azken bardak görseli düzgün düşer
                let tanVal = Math.max(-30, Math.min(30, Math.tan(rad)));

                // Matematiksel olarak mükemmel yatay su yüzeyi
                let leftY = (h/2 - fillH) + tanVal * (w/2);
                let rightY = (h/2 - fillH) - tanVal * (w/2);

                // BARDAK EĞİLİNCE DALGALANMA ARTAR + DOLUMA ÇARPMA
                cObj.waveMultiplier = cObj.waveMultiplier || 1;
                cObj.waveImpact = cObj.waveImpact || 0;
                cObj.waveImpact *= 0.88; // dalga bozulması zamanla söner
                let targetWaveMult = 1 + Math.abs(cObj.angle || 0) / 20;
                cObj.waveMultiplier += (targetWaveMult - cObj.waveMultiplier) * 0.05;

                const time = Date.now() / 1000;

                // ANA SIVI DALGASI (3 Katmanlı Sinüs)
                // PERFORMANS: Mobilde adım 4px (görsel olarak fark edilmez, %50 daha az sin hesabı)
                ctx.beginPath();
                let _waveFirst = true;
                for (let px = -w/2; px <= w/2; px += _waveStep) {
                    let pRatio = (px - (-w/2)) / w;
                    let baseY = leftY + (rightY - leftY) * pRatio;

                    const wave1 = Math.sin(time * 2.1 + px * 0.05) * 2.5;
                    const wave2 = Math.sin(time * 3.4 + px * 0.08) * 1.5;
                    const wave3 = Math.sin(time * 1.7 + px * 0.03) * 1.0;
                    // waveImpact: çarpma anında sertçe dalgalanır, zamanla söner
                    const impactWave = Math.sin(time * 12 + px * 0.18) * (cObj.waveImpact || 0);
                    const totalWave = (wave1 + wave2 + wave3) * cObj.waveMultiplier + impactWave;

                    if (_waveFirst) {
                        ctx.moveTo(px, baseY + totalWave);
                        _waveFirst = false;
                    } else {
                        ctx.lineTo(px, baseY + totalWave);
                    }
                }
                // Dalga altını kapat ve doldur
                ctx.lineTo(w/2, h/2);
                ctx.lineTo(-w/2, h/2);
                ctx.closePath();
                let lq = currentTheme.liquid.map(Math.round);
                
                // Anamenüde veya parlama istendiğinde glow efekti
                if (cObj.isMenu) {
                    ctx.save();
                    ctx.shadowColor = `rgba(${lq[0]}, ${lq[1]}, ${lq[2]}, 0.8)`;
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = `rgba(${lq[0]}, ${lq[1]}, ${lq[2]}, 0.8)`;
                    ctx.fill();
                    ctx.restore();
                }

                ctx.fillStyle = `rgba(${lq[0]}, ${lq[1]}, ${lq[2]}, 0.65)`;
                ctx.fill();

                // DALGA PARILTISI (Beyaz Şeffaf Çizgi)
                ctx.beginPath();
                for (let px = -w/2; px <= w/2; px += 2) {
                    let pRatio = (px - (-w/2)) / w;
                    let baseY = leftY + (rightY - leftY) * pRatio;

                    const wave1 = Math.sin(time * 2.1 + px * 0.05) * 2.5;
                    const wave2 = Math.sin(time * 3.4 + px * 0.08) * 1.5;
                    const wave3 = Math.sin(time * 1.7 + px * 0.03) * 1.0;
                    const totalWave = (wave1 + wave2 + wave3) * cObj.waveMultiplier;

                    if (px === -w/2) {
                        ctx.moveTo(px, baseY + totalWave);
                    } else {
                        ctx.lineTo(px, baseY + totalWave);
                    }
                }
                
                // Sağdan sola 3px aşağıda geri dön (kalın şerit)
                for (let px = w/2; px >= -w/2; px -= 2) {
                    let pRatio = (px - (-w/2)) / w;
                    let baseY = leftY + (rightY - leftY) * pRatio;

                    const wave1 = Math.sin(time * 2.1 + px * 0.05) * 2.5;
                    const wave2 = Math.sin(time * 3.4 + px * 0.08) * 1.5;
                    const wave3 = Math.sin(time * 1.7 + px * 0.03) * 1.0;
                    const totalWave = (wave1 + wave2 + wave3) * cObj.waveMultiplier;

                    ctx.lineTo(px, baseY + totalWave + 3);
                }
                ctx.closePath();
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
                ctx.fill();

                // DALGA PARILTISI (Beyaz Şeffaf Çizgi - En Üst)
                ctx.beginPath();
                for (let px = -w/2; px <= w/2; px += 2) {
                    let pRatio = (px - (-w/2)) / w;
                    let baseY = leftY + (rightY - leftY) * pRatio;

                    const wave1 = Math.sin(time * 2.1 + px * 0.05) * 2.5;
                    const wave2 = Math.sin(time * 3.4 + px * 0.08) * 1.5;
                    const wave3 = Math.sin(time * 1.7 + px * 0.03) * 1.0;
                    const totalWave = (wave1 + wave2 + wave3) * cObj.waveMultiplier;

                    if (px === -w/2) {
                        ctx.moveTo(px, baseY + totalWave);
                    } else {
                        ctx.lineTo(px, baseY + totalWave);
                    }
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            ctx.restore(); // Clip iptal

            // 1. BARDAK ŞEKLİ (Dış Çerçeve)
            buildCupPath();

            // 4. ALT BARDAK FARK (Dış kalın ana cam kenarı)
            let baseOpacity = 0.4;
            if (cObj === targetCup) {
                baseOpacity = 0.5 + (cObj.fill / 100) * 0.3;
            }
            ctx.strokeStyle = strokeColor;
            ctx.globalAlpha = baseOpacity;
            ctx.lineWidth = strokeW;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.globalAlpha = 1.0;

            // Tema bazlı ayaklık ve süslemeler
            if (shape === 'goblet') {
                // Şık taşlı ayaklık
                ctx.beginPath();
                ctx.moveTo(-10, hh);
                ctx.lineTo(10, hh);
                ctx.lineTo(8, hh + 15);
                ctx.lineTo(-8, hh + 15);
                ctx.fillStyle = 'rgba(255, 215, 0, 0.8)';
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(-8, hh + 15);
                ctx.quadraticCurveTo(-15, hh + 25, -25, hh + 45);
                ctx.lineTo(25, hh + 45);
                ctx.quadraticCurveTo(15, hh + 25, 8, hh + 15);
                ctx.fillStyle = 'rgba(255, 225, 50, 0.7)';
                ctx.fill();
                
                // Taşlar (kırmızı yakutlar)
                let rubyColor = 'rgba(255, 30, 50, 0.9)';
                ctx.beginPath(); ctx.arc(0, hh + 8, 3, 0, Math.PI*2); ctx.fillStyle = rubyColor; ctx.fill();
                ctx.beginPath(); ctx.arc(-12, hh + 35, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(0, hh + 35, 5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(12, hh + 35, 4, 0, Math.PI*2); ctx.fill();
            } else if (shape === 'honey') {
                // Bal peteği altıgen motifi
                ctx.beginPath();
                let hx = 0, hy = 0, hr = 14;
                for (let i = 0; i <= 6; i++) {
                    let angle = i * Math.PI / 3 + Math.PI/6;
                    let px = hx + Math.cos(angle) * hr;
                    let py = hy + Math.sin(angle) * hr;
                    if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.strokeStyle = 'rgba(255, 180, 50, 0.4)';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Küçük sızan bal damlası
                ctx.beginPath();
                ctx.arc(-topW*0.9, -hh*0.1, 4, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255, 170, 0, 0.8)';
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-topW*0.9, -hh*0.1);
                ctx.lineTo(-topW*0.9, -hh*0.1 + 10);
                ctx.strokeStyle = 'rgba(255, 170, 0, 0.8)';
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.stroke();
            } else if (shape === 'flask') {
                // ZEHİR için Sağ tarafta ölçek çizgileri
                ctx.beginPath();
                for(let my = -hh + 20; my < hh - 10; my += 15) {
                    let yRatio = (my - (-hh)) / (hh - (-hh));
                    let edgeX = topW + (botW - topW) * yRatio;
                    
                    ctx.moveTo(edgeX - 12, my);
                    ctx.lineTo(edgeX - 2, my);
                    
                    if (my + 7.5 < hh - 10) {
                        let midY = my + 7.5;
                        let midYRatio = (midY - (-hh)) / (hh - (-hh));
                        let midEdgeX = topW + (botW - topW) * midYRatio;
                        ctx.moveTo(midEdgeX - 6, midY);
                        ctx.lineTo(midEdgeX - 2, midY);
                    }
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Toxic hava kabarcıkları (bubbles)
                ctx.beginPath();
                ctx.arc(-topW*0.3, hh*0.5, 4, 0, Math.PI*2);
                ctx.arc(topW*0.2, hh*0.2, 3, 0, Math.PI*2);
                ctx.arc(-topW*0.1, -hh*0.1, 5, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(100, 255, 100, 0.4)';
                ctx.fill();
            } else if (shape === 'volcano') {
                // LAV için Cam Çatlakları / Lav damarları
                ctx.beginPath();
                ctx.moveTo(-topW*0.5, -hh*0.5);
                ctx.lineTo(-topW*0.3, 0);
                ctx.lineTo(-topW*0.6, hh*0.4);
                ctx.lineTo(-topW*0.2, hh*0.8);
                
                ctx.moveTo(topW*0.4, -hh*0.3);
                ctx.lineTo(topW*0.6, hh*0.1);
                ctx.lineTo(topW*0.2, hh*0.6);
                
                ctx.strokeStyle = 'rgba(255, 100, 0, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
                // İç aydınlık damar
                ctx.strokeStyle = 'rgba(255, 200, 50, 0.9)';
                ctx.lineWidth = 1;
                ctx.stroke();
            } else if (shape === 'normal') {
                // SU eskisi gibi düz kalacak, detay eklenmedi
            } else if (shape === 'mystic') {
                // Gece/Fantastik için mistik hilal ve yıldızlar
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(200, 150, 255, 0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Hilal
                ctx.beginPath();
                ctx.arc(0, 0, 10, -Math.PI*0.5, Math.PI*0.5, false);
                ctx.arc(-4, 0, 8, Math.PI*0.5, -Math.PI*0.5, true);
                ctx.fillStyle = 'rgba(220, 180, 255, 0.8)';
                ctx.fill();

                // Etrafta minik yıldız noktaları
                ctx.beginPath();
                ctx.arc(-20, -15, 1.5, 0, Math.PI*2);
                ctx.arc(20, 15, 1.5, 0, Math.PI*2);
                ctx.arc(-15, 25, 2, 0, Math.PI*2);
                ctx.arc(15, -25, 2, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
            }

            // 2. SOL KENAR PARILTISI (Cam Yansıması)
            ctx.beginPath();
            if (shape === 'goblet') {
                ctx.moveTo(-topW + 4, -hh + 8);
                ctx.bezierCurveTo(-topW + 4, 0, -botW + 4, hh - r, -botW + r, hh - 2);
            } else if (shape === 'honey') {
                ctx.moveTo(-topW + 4, -hh + 8);
                ctx.bezierCurveTo(-topW*1.5 + 4, -hh/2, -botW + 4, hh - 4, -topW*0.7, hh - 2);
            } else if (shape === 'mystic') {
                ctx.moveTo(-topW + 4, -hh + 8);
                ctx.lineTo(-topW - 4, -hh/2 + 10);
                ctx.lineTo(-botW + 4, hh - r - 4);
            } else {
                ctx.moveTo(-topW + 4, -hh + 8);
                ctx.lineTo(-botW + 4, hh - 8);
            }
            ctx.strokeStyle = glassHighlight;
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // SAĞ KENAR (İsteğe bağlı sönük parıltı)
            ctx.beginPath();
            if (shape === 'goblet') {
                ctx.moveTo(topW - 4, -hh + 8);
                ctx.bezierCurveTo(topW - 4, 0, botW - 4, hh - r, botW - r, hh - 2);
            } else if (shape === 'honey') {
                ctx.moveTo(topW - 4, -hh + 8);
                ctx.bezierCurveTo(topW*1.5 - 4, -hh/2, botW - 4, hh - 4, topW*0.7, hh - 2);
            } else if (shape === 'mystic') {
                ctx.moveTo(topW - 4, -hh + 8);
                ctx.lineTo(topW + 4, -hh/2 + 10);
                ctx.lineTo(botW - 4, hh - r - 4);
            } else {
                ctx.moveTo(topW - 4, -hh + 8);
                ctx.lineTo(botW - 4, hh - 8);
            }
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 3. İÇ YANSIMA (Büyük oval)
            ctx.beginPath();
            ctx.ellipse(
                -topW * 0.4,
                -hh * 0.3,
                topW * 0.18,
                hh * 0.28,
                -0.3,
                0, Math.PI * 2
            );
            ctx.fillStyle = 'rgba(255,255,255,0.07)';
            ctx.fill();

            ctx.restore();
        }

        // Ana Menü için akan sıvı damlacıkları
        if (!window.menuDrops) {
            window.menuDrops = [];
            for (let i = 0; i < 30; i++) {
                window.menuDrops.push({
                    x: Math.random() * 390,
                    y: Math.random() * 844,
                    vy: 0.4 + Math.random() * 0.9,
                    r: 1.2 + Math.random() * 2.5,
                    alpha: 0.15 + Math.random() * 0.35,
                    phase: Math.random() * Math.PI * 2,
                    colorIdx: Math.floor(Math.random() * 6)
                });
            }
        }

        function drawBarBackground() {
            let t = Date.now() / 1000;
            let W = canvas.width, H = canvas.height;

            // ─── MENÜ DÖNGÜSEL TEMA (her 6 saniyede bir tema değişir) ───
            const menuThemes = [
                {bg:[18,38,62], lq:[79,195,247]},    // Su
                {bg:[50,22,4],  lq:[255,120,20]},    // Lav
                {bg:[8,44,16],  lq:[0,230,100]},     // Zehir
                {bg:[44,38,4],  lq:[255,210,40]},    // Altın
                {bg:[44,6,6],   lq:[220,30,50]},     // Kan
                {bg:[22,14,48], lq:[160,110,240]}    // Gece
            ];
            let menuT = (t / 6) % menuThemes.length;
            let menuI1 = Math.floor(menuT) % menuThemes.length;
            let menuI2 = (menuI1 + 1) % menuThemes.length;
            let menuMix = menuT - Math.floor(menuT);
            // Smooth lerp
            let menuTheme = {
                bg: [
                    menuThemes[menuI1].bg[0] * (1-menuMix) + menuThemes[menuI2].bg[0] * menuMix,
                    menuThemes[menuI1].bg[1] * (1-menuMix) + menuThemes[menuI2].bg[1] * menuMix,
                    menuThemes[menuI1].bg[2] * (1-menuMix) + menuThemes[menuI2].bg[2] * menuMix
                ],
                lq: [
                    menuThemes[menuI1].lq[0] * (1-menuMix) + menuThemes[menuI2].lq[0] * menuMix,
                    menuThemes[menuI1].lq[1] * (1-menuMix) + menuThemes[menuI2].lq[1] * menuMix,
                    menuThemes[menuI1].lq[2] * (1-menuMix) + menuThemes[menuI2].lq[2] * menuMix
                ],
                idx: menuI1
            };

            // ── 1. ARKA PLAN: Derin koyu gradient ──
            let mbg = menuTheme.bg.map(Math.round);
            let bg = ctx.createLinearGradient(0, 0, 0, H);
            bg.addColorStop(0,   `rgb(${Math.max(0,mbg[0]-8)},${Math.max(0,mbg[1]-8)},${Math.max(0,mbg[2]-8)})`);
            bg.addColorStop(0.4, `rgb(${mbg[0]},${mbg[1]},${mbg[2]})`);
            bg.addColorStop(1,   `rgb(${Math.round(mbg[0]*0.3)},${Math.round(mbg[1]*0.3)},${Math.round(mbg[2]*0.3)})`);
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            // Köşe glow (mavi)
            let cg = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, 320);
            let mlq = menuTheme.lq.map(Math.round);
            cg.addColorStop(0, `rgba(${mlq[0]},${mlq[1]},${mlq[2]},0.10)`);
            cg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = cg;
            ctx.fillRect(0, 0, W, H);

            // Alt glow (turkuaz)
            let bg2 = ctx.createRadialGradient(W/2, H, 0, W/2, H, 280);
            bg2.addColorStop(0, `rgba(${mlq[0]},${mlq[1]},${mlq[2]},0.14)`);
            bg2.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = bg2;
            ctx.fillRect(0, H-280, W, 280);

            // Tarama çizgileri
            ctx.strokeStyle = 'rgba(255,255,255,0.018)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let y = 0; y < H; y += 32) { ctx.moveTo(0,y); ctx.lineTo(W,y); }
            ctx.stroke();

            // ─── TEMA BİLİNÇLİ ATMOSFER (oyun içiyle aynı stil) ───
            let mlq2 = menuTheme.lq.map(Math.round);
            let mIdx = menuTheme.idx;
            for (let i = 0; i < window.menuDrops.length; i++) {
                let d = window.menuDrops[i];
                
                if (mIdx === 0) {
                    // Su: yukarı çıkan kabarcıklar
                    d.y -= 0.4 + d.r * 0.15;
                    d.x += Math.sin(t * 0.6 + d.phase) * 0.3;
                    d.phase += 0.008;
                    if (d.y < -10) { d.y = H + 10; d.x = Math.random() * W; }
                    let pA = 0.3 + Math.sin(t * 1.8 + d.phase) * 0.2;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${mlq2[0]},${mlq2[1]},${mlq2[2]},${pA * 0.4})`;
                    ctx.fill();
                    if (d.r > 1.5) {
                        ctx.strokeStyle = `rgba(255,255,255,${pA * 0.6})`;
                        ctx.lineWidth = 0.7;
                        ctx.stroke();
                    }
                }
                else if (mIdx === 1) {
                    // Lav: hızlı uçuşan kıvılcımlar
                    d.y -= 1.0 + d.r * 0.3;
                    d.x += Math.sin(t * 1.2 + d.phase) * 0.5;
                    d.phase += 0.02;
                    if (d.y < -5) { d.y = H + Math.random() * 50; d.x = Math.random() * W; }
                    let sparkLife = (Math.sin(t * 3 + d.phase) + 1) * 0.5;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,${180 + Math.floor(sparkLife*60)},40,${0.7 * sparkLife})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x, d.y + 8);
                    ctx.strokeStyle = `rgba(255,140,40,${0.3 * sparkLife})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                else if (mIdx === 2) {
                    // Zehir: yavaş asit halkaları
                    d.y -= 0.3;
                    d.x += Math.sin(t * 0.4 + d.phase) * 0.5;
                    d.phase += 0.005;
                    if (d.y < -10) { d.y = H + 10; d.x = Math.random() * W; }
                    let pA = 0.4 + Math.sin(t * 1.2 + d.phase) * 0.3;
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r * 1.3, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(${mlq2[0]},${mlq2[1]},${mlq2[2]},${pA * 0.7})`;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
                else if (mIdx === 3) {
                    // Altın: parıldayan 4 köşeli yıldızlar
                    d.phase += 0.04;
                    d.x += Math.sin(t * 0.3 + d.phase) * 0.05;
                    d.y += Math.cos(t * 0.4 + d.phase) * 0.05;
                    if (d.y < -10) { d.y = H + 10; d.x = Math.random() * W; }
                    if (d.y > H + 10) { d.y = -10; d.x = Math.random() * W; }
                    let twink = (Math.sin(d.phase) + 1) * 0.5;
                    let starSize = d.r * (0.5 + twink * 0.8);
                    ctx.save();
                    ctx.translate(d.x, d.y);
                    ctx.fillStyle = `rgba(255,210,40,${0.8 * twink})`;
                    ctx.beginPath();
                    ctx.moveTo(0, -starSize);
                    ctx.lineTo(starSize * 0.25, -starSize * 0.25);
                    ctx.lineTo(starSize, 0);
                    ctx.lineTo(starSize * 0.25, starSize * 0.25);
                    ctx.lineTo(0, starSize);
                    ctx.lineTo(-starSize * 0.25, starSize * 0.25);
                    ctx.lineTo(-starSize, 0);
                    ctx.lineTo(-starSize * 0.25, -starSize * 0.25);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
                else if (mIdx === 4) {
                    // Kan: yukarıdan aşağı damlayan izler
                    d.life = (d.life || Math.random()) + 0.004;
                    if (d.life > 1) {
                        d.life = 0;
                        d.x = Math.random() * W;
                        d.y = -20 - Math.random() * 100;
                    }
                    let dripY = d.y + d.life * (H + 100);
                    let dripA = 0.7 * (1 - d.life * d.life);
                    let trailGrad = ctx.createLinearGradient(d.x, dripY - 20, d.x, dripY);
                    trailGrad.addColorStop(0, `rgba(${mlq2[0]},${mlq2[1]},${mlq2[2]},0)`);
                    trailGrad.addColorStop(1, `rgba(${mlq2[0]},${mlq2[1]},${mlq2[2]},${dripA * 0.6})`);
                    ctx.beginPath();
                    ctx.moveTo(d.x, dripY - 20);
                    ctx.lineTo(d.x, dripY);
                    ctx.strokeStyle = trailGrad;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.ellipse(d.x, dripY, d.r * 0.7, d.r * 1.2, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${mlq2[0]},${mlq2[1]},${mlq2[2]},${dripA})`;
                    ctx.fill();
                }
                else {
                    // Gece: parıldayan + bazıları kayan yıldızlar
                    d.phase += 0.025 + d.r * 0.01;
                    let twink = (Math.sin(d.phase) + 1) * 0.5;
                    let isFalling = (d.r > 2.5);
                    if (isFalling) {
                        d.x += 1.5;
                        d.y += 0.8;
                        if (d.x > W + 30) {
                            d.x = -30 - Math.random() * 100;
                            d.y = Math.random() * H * 0.5;
                        }
                        let tailGrad = ctx.createLinearGradient(d.x, d.y, d.x - 30, d.y - 15);
                        tailGrad.addColorStop(0, `rgba(255,255,255,${0.9 * twink})`);
                        tailGrad.addColorStop(1, `rgba(255,255,255,0)`);
                        ctx.beginPath();
                        ctx.moveTo(d.x, d.y);
                        ctx.lineTo(d.x - 30, d.y - 15);
                        ctx.strokeStyle = tailGrad;
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(d.x, d.y, 1.5, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,255,255,${0.8 * twink})`;
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(d.x, d.y, d.r * 0.5, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,255,255,${0.8 * twink})`;
                        ctx.fill();
                        if (d.r > 1.8 && twink > 0.7) {
                            ctx.strokeStyle = `rgba(255,255,255,${0.6 * twink})`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(d.x - d.r * 2, d.y); ctx.lineTo(d.x + d.r * 2, d.y);
                            ctx.moveTo(d.x, d.y - d.r * 2); ctx.lineTo(d.x, d.y + d.r * 2);
                            ctx.stroke();
                        }
                    }
                }
            }

            // ── 3. BÜYÜK BARDAK GÖRSELİ (Merkez dekor - Oyun içiyle aynı) ──
            if (!window.menuCup) {
                window.menuCup = { x: W/2, y: 340, w: 145, h: 175, fill: 65, angle: 0, isMenu: true };
            }
            // Hafif süzülme ve nefes alma efekti
            window.menuCup.angle = Math.sin(t * 0.8) * 3;
            window.menuCup.scale = 1.0 + Math.sin(t * 1.5) * 0.02;
            // Menü bardağına geçici tema rengi ata
            let _savedLq = [currentTheme.liquid[0], currentTheme.liquid[1], currentTheme.liquid[2]];
            currentTheme.liquid[0] = menuTheme.lq[0];
            currentTheme.liquid[1] = menuTheme.lq[1];
            currentTheme.liquid[2] = menuTheme.lq[2];
            drawCup(window.menuCup);
            currentTheme.liquid[0] = _savedLq[0];
            currentTheme.liquid[1] = _savedLq[1];
            currentTheme.liquid[2] = _savedLq[2];

            // Bardaktan damlayan su animasyonu (isteğe bağlı, dekoratif devam)
            let dropT = (t * 0.8) % 1;
            let dropX = window.menuCup.x + window.menuCup.w/2 + 2;
            let dropY = (window.menuCup.y - window.menuCup.h/2) + dropT * (window.menuCup.h * 1.5);
            let dropA = dropT < 0.5 ? dropT * 2 : (1 - dropT) * 2;
            let lq = menuTheme.lq;
            ctx.beginPath();
            ctx.ellipse(dropX, dropY, 2.5, 3.5 + dropT * 2, 0, 0, Math.PI*2);
            ctx.fillStyle = `rgba(${lq[0]},${lq[1]},${lq[2]},${dropA * 0.6})`;
            ctx.fill();

            // ── 4. BAŞLIK ──
            let flicker = 0.92 + Math.sin(t * 14) * 0.08;
            if (Math.random() > 0.985) flicker = 0.25;
            ctx.save();
            ctx.textAlign = 'center';
            // Glow katmanı
            ctx.shadowColor = '#4fc3f7';
            ctx.shadowBlur = 30;
            ctx.fillStyle = `rgba(79,195,247,${flicker})`;
            ctx.font = "bold 48px 'Bebas Neue', cursive";
            ctx.fillText('POUR DOWN', W/2, 130);
            // İnce beyaz üst katman
            ctx.shadowBlur = 8;
            ctx.fillStyle = `rgba(220,245,255,${flicker * 0.7})`;
            ctx.font = "bold 48px 'Bebas Neue', cursive";
            ctx.fillText('POUR DOWN', W/2, 130);
            ctx.restore();

            // Alt başlık
            ctx.save();
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(150,210,240,0.75)';
            ctx.font = "16px 'Bebas Neue', cursive";
            ctx.fillText('Doldur  •  Dök  •  İlerle', W/2, 165);
            ctx.restore();

            // Seviye rozeti (tema rengi çizgi)
            ctx.save();
            ctx.strokeStyle = 'rgba(79,195,247,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(60, 185); ctx.lineTo(W-60, 185); ctx.stroke();
            ctx.restore();
        }

        // Ana oyun döngüsü
        let lastFrameTime = performance.now();
        let dt = 1; // 60Hz'e göre normalize edilmiş çarpan
        function draw() {
            let nowTime = performance.now();
            // TEMPO: dt referansını 8.33 (120Hz) → 7.0 (~143Hz) yaptık.
            // Sonuç: tüm animasyonlar ~%19 daha hızlı akar (bardak hareketi, sıvı dökme, geçişler).
            // clamp 2.5 → 3.0 (düşük FPS'te de tempo korunur, kasma olsa bile akış yavaşlamaz)
            dt = Math.min(3.0, (nowTime - lastFrameTime) / 7.0);
            lastFrameTime = nowTime;

            // ─── PERFORMANS: FPS sayımı + Adaptive ambient ───
            _fpsFrameCount++;
            if (nowTime - _fpsLastCheck >= 1000) {
                _currentFps = _fpsFrameCount;
                _fpsFrameCount = 0;
                _fpsLastCheck = nowTime;
                _fpsHistory.shift(); _fpsHistory.push(_currentFps);
                // Son 3 saniyenin ortalaması düşükse particle azalt
                let avg = (_fpsHistory[0] + _fpsHistory[1] + _fpsHistory[2]) / 3;
                if (avg < 50 && _ambientParticleTarget > 25) {
                    _ambientParticleTarget = 25;
                } else if (avg > 58 && _ambientParticleTarget < 50) {
                    _ambientParticleTarget = 50;
                }
            }
            if (gameState.state === 'MENU') {
                drawBarBackground();
                let W = canvas.width, H = canvas.height;

                // ── REKOR KUTUSU (glassmorphism) ──
                let scoreText = '🏆  ' + gameState.highScore;
                let recY = 615;
                ctx.save();
                ctx.fillStyle = 'rgba(255,215,0,0.07)';
                ctx.beginPath(); ctx.roundRect(W/2 - 100, recY, 200, 50, 25); ctx.fill();
                ctx.strokeStyle = 'rgba(255,215,0,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.shadowColor = 'rgba(255,215,0,0.6)'; ctx.shadowBlur = 12;
                ctx.fillStyle = '#FFD700';
                ctx.font = "bold 20px 'Bebas Neue', cursive";
