                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(scoreText, W/2, recY + 25);
                ctx.shadowBlur = 0; ctx.textBaseline = 'alphabetic';
                ctx.restore();

                // ── OYNA BUTONU ──
                let pY2 = btnPlay.y;
                ctx.save();
                // Dış glow halkası
                ctx.shadowColor = '#4fc3f7'; ctx.shadowBlur = 22;
                let pG = ctx.createLinearGradient(0, pY2 - 30, 0, pY2 + 30);
                pG.addColorStop(0, '#29b6f6');
                pG.addColorStop(1, '#0277bd');
                ctx.fillStyle = pG;
                ctx.beginPath();
                ctx.roundRect(btnPlay.x - btnPlay.w/2, pY2 - 30, btnPlay.w, 60, 30); ctx.fill();
                // Üst parıltı şeridi
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.beginPath();
                ctx.roundRect(btnPlay.x - btnPlay.w/2 + 8, pY2 - 28, btnPlay.w - 16, 22, [16,16,0,0]); ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = "bold 28px 'Bebas Neue', cursive";
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('▶  OYNA', W/2, pY2 + 2);
                ctx.textBaseline = 'alphabetic';
                ctx.restore();

                // ── SES BUTONU ──
                ctx.save();
                ctx.beginPath();
                ctx.arc(btnSound.x, btnSound.y, btnSound.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
                ctx.fill(); ctx.stroke();
                ctx.fillStyle = 'white';
                ctx.font = "18px 'Bebas Neue', cursive"; ctx.textAlign = 'center';
                ctx.fillText(gameState.soundEnabled ? '🔊' : '🔇', btnSound.x, btnSound.y + 6);
                ctx.restore();

                // ── MÜZİK BUTONU ──
                ctx.save();
                ctx.beginPath();
                ctx.arc(btnMusic.x, btnMusic.y, btnMusic.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
                ctx.fill(); ctx.stroke();
                ctx.fillStyle = 'white';
                ctx.font = "18px 'Bebas Neue', cursive"; ctx.textAlign = 'center';
                ctx.fillText('🎵', btnMusic.x, btnMusic.y + 6);
                // Müzik kapalıysa üzerinde kırmızı X göster
                if (!gameState.musicEnabled) {
                    ctx.strokeStyle = 'rgba(255,80,80,0.95)';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(btnMusic.x - 11, btnMusic.y - 11);
                    ctx.lineTo(btnMusic.x + 11, btnMusic.y + 11);
                    ctx.stroke();
                }
                ctx.restore();

                // ── BUGÜNÜN GÖREVLERİ PANELİ ──
                let mY = 670;
                ctx.save();
                // Panel arka planı (biraz daha büyük ve görünür)
                ctx.fillStyle = 'rgba(0,0,0,0.45)';
                ctx.beginPath(); ctx.roundRect(W/2 - 155, mY, 310, 122, 14); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1; ctx.stroke();
                // Başlık - büyütüldü ve daha belirgin
                ctx.fillStyle = 'rgba(255,255,255,0.75)';
                ctx.font = "bold 14px 'Bebas Neue', cursive"; ctx.textAlign = 'center';
                ctx.fillText('📋  GÜNLÜK GÖREVLER', W/2, mY + 20);
                // Başlık altı ince ayırıcı çizgi
                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(W/2 - 130, mY + 28);
                ctx.lineTo(W/2 + 130, mY + 28);
                ctx.stroke();
                dailyMissions.forEach(function(m, i) {
                    let my = mY + 36 + i * 28;
                    let pct = m.done ? 1 : Math.min(1, m.progress / m.target);
                    // Progress bar arka planı (daha kalın)
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.beginPath(); ctx.roundRect(W/2 - 143, my, 286, 22, 11); ctx.fill();
                    // Progress dolgu
                    if (pct > 0) {
                        ctx.fillStyle = m.done ? '#4caf50' : '#4fc3f7';
                        ctx.beginPath(); ctx.roundRect(W/2 - 143, my, 286 * pct, 22, 11); ctx.fill();
                    }
                    // Görev metni - büyütüldü ve daha okunaklı
                    ctx.fillStyle = m.done ? 'rgba(180,255,180,1)' : 'rgba(255,255,255,0.95)';
                    ctx.font = "bold 14px 'Bebas Neue', cursive"; ctx.textAlign = 'left';
                    ctx.fillText((m.done ? '✅' : m.icon) + ' ' + m.text, W/2 - 137, my + 16);
                    // Bonus puan - büyütüldü
                    ctx.textAlign = 'right';
                    ctx.fillStyle = '#ffd700';
                    ctx.font = "bold 14px 'Bebas Neue', cursive";
                    ctx.fillText('+' + m.bonus, W/2 + 137, my + 16);
                });
                ctx.restore();

                // ── ALT BİLGİ ŞERİDİ ──
                ctx.save();
                let sbGrad = ctx.createLinearGradient(0, H - 38, 0, H);
                sbGrad.addColorStop(0, 'rgba(0,0,0,0)');
                sbGrad.addColorStop(1, 'rgba(0,0,0,0.45)');
                ctx.fillStyle = sbGrad;
                ctx.fillRect(0, H - 38, W, 38);
                ctx.strokeStyle = 'rgba(79,195,247,0.18)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(20, H - 38); ctx.lineTo(W - 20, H - 38); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.28)';
                ctx.font = "14px 'Bebas Neue', cursive";
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('POUR DOWN  v1.1  •  🏆 REKOR: ' + gameState.highScore, W / 2, H - 18);
                ctx.textBaseline = 'alphabetic';
                ctx.restore();

                requestAnimationFrame(draw);
                return;
            }

            // Tema Güncelleme ve Geçiş
            let themeIndex = Math.floor((gameState.level - 1) / 5) % themes.length;
            let targetTheme = themes[themeIndex];
            
            // Yumuşak renk geçişi (lerp)
            currentTheme.bgInner = lerpArray(currentTheme.bgInner, targetTheme.bgInner, 0.02);
            currentTheme.bgOuter = lerpArray(currentTheme.bgOuter, targetTheme.bgOuter, 0.02);
            currentTheme.liquid = lerpArray(currentTheme.liquid, targetTheme.liquid, 0.02);

            // Tema Değişim Dalga Efekti Tetikleyici
            if (themeIndex !== lastThemeIndex) {
                themeRings.push({ r: 0, alpha: 0.6, color: [...targetTheme.liquid] });
                lastThemeIndex = themeIndex;
            }

            // OYUN ARKA PLANI — Zengin Atmosferik Arka Plan
            {
                let t2 = Date.now() / 1000;
                let lqBg = currentTheme.liquid.map(Math.round);
                let cIn = currentTheme.bgInner.map(Math.round);
                let cOut = currentTheme.bgOuter.map(Math.round);

                // 1. Çok katmanlı dikey gradient (derinlik hissi)
                let bgG = ctx.createLinearGradient(0, 0, 0, canvas.height);
                bgG.addColorStop(0,   `rgb(${Math.min(255,cOut[0]+8)},${Math.min(255,cOut[1]+8)},${Math.min(255,cOut[2]+8)})`);
                bgG.addColorStop(0.3, `rgb(${cIn[0]},${cIn[1]},${cIn[2]})`);
                bgG.addColorStop(0.65,`rgb(${Math.round(cIn[0]*0.75)},${Math.round(cIn[1]*0.75)},${Math.round(cIn[2]*0.75)})`);
                bgG.addColorStop(1,   `rgb(${cOut[0]},${cOut[1]},${cOut[2]})`);
                ctx.fillStyle = bgG;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 2. Nefes alan merkez glow
                let pulse = 260 + Math.sin(t2 * 0.75) * 40;
                let cGlow = ctx.createRadialGradient(canvas.width/2, canvas.height*0.38, 0, canvas.width/2, canvas.height*0.38, pulse);
                cGlow.addColorStop(0, `rgba(${lqBg[0]},${lqBg[1]},${lqBg[2]},0.14)`);
                cGlow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = cGlow;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 3. Yukarıdan ışık huzmesi
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                let rayG = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.75);
                rayG.addColorStop(0, `rgba(${lqBg[0]},${lqBg[1]},${lqBg[2]},0.1)`);
                rayG.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = rayG;
                ctx.beginPath();
                ctx.moveTo(canvas.width/2 - 50, 0);
                ctx.lineTo(canvas.width/2 + 50, 0);
                ctx.lineTo(canvas.width/2 + 200, canvas.height * 0.75);
                ctx.lineTo(canvas.width/2 - 200, canvas.height * 0.75);
                ctx.fill();

                // 4. Hareketli ışık orbs (2 adet)
                for (let oi = 0; oi < 2; oi++) {
                    let ox = canvas.width/2 + Math.sin(t2*0.38 + oi*2.2)*130;
                    let oy = canvas.height/2 + Math.cos(t2*0.28 + oi*1.9)*160;
                    let oG = ctx.createRadialGradient(ox, oy, 0, ox, oy, 200);
                    oG.addColorStop(0, `rgba(${lqBg[0]},${lqBg[1]},${lqBg[2]},0.07)`);
                    oG.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = oG;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                ctx.restore();

                // 5. Zemin yansıması
                let floorG = ctx.createRadialGradient(canvas.width/2, canvas.height, 0, canvas.width/2, canvas.height, 230);
                floorG.addColorStop(0, `rgba(${lqBg[0]},${lqBg[1]},${lqBg[2]},0.18)`);
                floorG.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = floorG;
                ctx.fillRect(0, canvas.height - 230, canvas.width, 230);

                // ─── TEMA BAZLI TAM EKRAN GÖRSEL EFEKTİ ───
                let themeIdxFx = Math.floor((gameState.level - 1) / 5) % 6;
                
                if (themeIdxFx === 1) {
                    // LAV: alttan turuncu glow nefes alır
                    let lavaGlow = ctx.createLinearGradient(0, canvas.height, 0, canvas.height * 0.4);
                    let lavaP = 0.5 + Math.sin(t2 * 1.2) * 0.15;
                    lavaGlow.addColorStop(0, `rgba(255,120,20,${0.18 * lavaP})`);
                    lavaGlow.addColorStop(1, 'rgba(255,120,20,0)');
                    ctx.fillStyle = lavaGlow;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                else if (themeIdxFx === 2) {
                    // ZEHİR: yatay sis bantları
                    for (let fb = 0; fb < 3; fb++) {
                        let fy = canvas.height * (0.3 + fb * 0.25) + Math.sin(t2 * 0.4 + fb) * 30;
                        let fogG = ctx.createRadialGradient(canvas.width/2, fy, 0, canvas.width/2, fy, 200);
                        fogG.addColorStop(0, `rgba(0,230,100,0.08)`);
                        fogG.addColorStop(1, 'rgba(0,230,100,0)');
                        ctx.fillStyle = fogG;
                        ctx.fillRect(0, fy - 100, canvas.width, 200);
                    }
                }
                else if (themeIdxFx === 3) {
                    // ALTIN: ışık çakıntıları (rastgele şimşek parıltıları)
                    if (Math.random() < 0.02) {
                        let flashX = Math.random() * canvas.width;
                        let flashY = Math.random() * canvas.height;
                        let flashG = ctx.createRadialGradient(flashX, flashY, 0, flashX, flashY, 60);
                        flashG.addColorStop(0, 'rgba(255,230,100,0.4)');
                        flashG.addColorStop(1, 'rgba(255,230,100,0)');
                        ctx.fillStyle = flashG;
                        ctx.fillRect(flashX - 60, flashY - 60, 120, 120);
                    }
                }
                else if (themeIdxFx === 4) {
                    // KAN: kenar vinyetlemesi (köşeler kararır)
                    let vignG = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height * 0.3, canvas.width/2, canvas.height/2, canvas.height * 0.7);
                    vignG.addColorStop(0, 'rgba(0,0,0,0)');
                    vignG.addColorStop(1, 'rgba(40,0,0,0.5)');
                    ctx.fillStyle = vignG;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                else if (themeIdxFx === 5) {
                    // GECE: nebula bulutu (yavaş hareket eden mor)
                    let nebX = canvas.width * 0.3 + Math.sin(t2 * 0.15) * 80;
                    let nebY = canvas.height * 0.4 + Math.cos(t2 * 0.12) * 60;
                    let nebG = ctx.createRadialGradient(nebX, nebY, 0, nebX, nebY, 250);
                    nebG.addColorStop(0, `rgba(160,110,240,0.18)`);
                    nebG.addColorStop(0.5, `rgba(160,110,240,0.05)`);
                    nebG.addColorStop(1, 'rgba(160,110,240,0)');
                    ctx.fillStyle = nebG;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                // 6. Tarama çizgileri (hafif)
                ctx.strokeStyle = 'rgba(255,255,255,0.012)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let sy = 0; sy < canvas.height; sy += 28) {
                    ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy);
                }
                ctx.stroke();

                // 7. TEMA BİLİNÇLİ ATMOSFER PARÇACIKLARI
                let themeIdxBg = Math.floor((gameState.level - 1) / 5) % 6;
                
                // ADAPTIVE: FPS düşükse daha az particle render et
                let _ambLimit = Math.min(_ambientParticleTarget, ambientParticles.length);
                for (let ap = 0; ap < _ambLimit; ap++) {
                    let p = ambientParticles[ap];
                    
                    if (themeIdxBg === 0) {
                        // ─── SU: yukarı çıkan baloncuklar (içi boş halka) ───
                        p.y += p.vy;
                        p.x += p.vx + Math.sin(t2 * 0.6 + p.phase) * 0.25;
                        p.phase += 0.008;
                        if (p.y < -8) { p.y = canvas.height + 8; p.x = Math.random() * canvas.width; }
                        let pA = p.alpha * (0.6 + Math.sin(t2 * 1.8 + p.phase) * 0.4);
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${lqBg[0]},${lqBg[1]},${lqBg[2]},${pA * 0.4})`;
                        ctx.fill();
                        if (p.r > 1.5) {
                            ctx.strokeStyle = `rgba(255,255,255,${pA * 0.6})`;
                            ctx.lineWidth = 0.7;
                            ctx.stroke();
                        }
                    }
                    else if (themeIdxBg === 1) {
                        // ─── LAV: yukarı uçuşan kıvılcımlar (parlak nokta + iz) ───
                        p.y += p.vy * 1.5;
                        p.x += p.vx + Math.sin(t2 * 1.2 + p.phase) * 0.4;
                        p.phase += 0.02;
                        if (p.y < -5) { p.y = canvas.height + Math.random() * 50; p.x = Math.random() * canvas.width; }
                        // kıvılcım parlama
                        let sparkLife = (Math.sin(t2 * 3 + p.phase) + 1) * 0.5;
                        let sparkA = p.alpha * 3 * sparkLife;
                        // ana kıvılcım
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r * 0.8, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,${180 + Math.floor(sparkLife*60)},40,${sparkA})`;
                        ctx.fill();
                        // izi (alt taraf)
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p.x - p.vx * 6, p.y - p.vy * 8);
                        ctx.strokeStyle = `rgba(255,140,40,${sparkA * 0.4})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                    else if (themeIdxBg === 2) {
                        // ─── ZEHİR: ağır asit baloncukları (yavaş, halka) ───
                        p.y += p.vy * 0.5;
                        p.x += p.vx + Math.sin(t2 * 0.4 + p.phase) * 0.5;
                        p.phase += 0.005;
                        if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
                        let pA = p.alpha * (0.5 + Math.sin(t2 * 1.2 + p.phase) * 0.5);
                        // halka
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r * 1.3, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(${lqBg[0]},${lqBg[1]},${lqBg[2]},${pA * 0.7})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                    else if (themeIdxBg === 3) {
                        // ─── ALTIN: parıldayan yıldızlar (4 köşeli sparkle) ───
                        p.twinkle += 0.04;
                        p.x += Math.sin(t2 * 0.3 + p.phase) * 0.05;
                        p.y += Math.cos(t2 * 0.4 + p.phase) * 0.05;
                        let twink = (Math.sin(p.twinkle) + 1) * 0.5;
                        let starA = p.alpha * 2 * twink;
                        let starSize = p.r * (0.5 + twink * 0.8);
                        // 4 köşeli yıldız
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.phase);
                        ctx.fillStyle = `rgba(255,210,40,${starA})`;
                        ctx.beginPath();
                        ctx.moveTo(0, -starSize);
                        ctx.lineTo(starSize * 0.25, -starSize * 0.25);
                        ctx.lineTo(starSize, 0);
                        ctx.lineTo(starSize * 0.25, starSize * 0.25);
                        ctx.lineTo(0, starSize);
                        ctx.lineTo(-starSize * 0.25, starSize * 0.25);
                        ctx.lineTo(-starSize, 0);
                        ctx.lineTo(-starSize * 0.25, -starSize * 0.25);
                        ctx.closePath();
                        ctx.fill();
                        ctx.restore();
                    }
                    else if (themeIdxBg === 4) {
                        // ─── KAN: yukarıdan damlayan kırmızı izler ───
                        // p.life kullanılıyor: 0'dan 1'e gidip resetleniyor
                        p.life += 0.004;
                        if (p.life > 1) {
                            p.life = 0;
                            p.x = Math.random() * canvas.width;
                            p.y = -20 - Math.random() * 100;
                        }
                        let dripY = p.y + p.life * (canvas.height + 100);
                        let dripA = p.alpha * 2.5 * (1 - p.life * p.life);
                        // dikey iz çizgisi
                        ctx.beginPath();
                        ctx.moveTo(p.x, dripY - 20);
                        ctx.lineTo(p.x, dripY);
                        let trailGrad = ctx.createLinearGradient(p.x, dripY - 20, p.x, dripY);
                        trailGrad.addColorStop(0, `rgba(${lqBg[0]},${lqBg[1]},${lqBg[2]},0)`);
                        trailGrad.addColorStop(1, `rgba(${lqBg[0]},${lqBg[1]},${lqBg[2]},${dripA * 0.6})`);
                        ctx.strokeStyle = trailGrad;
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                        // damla başı
                        ctx.beginPath();
                        ctx.ellipse(p.x, dripY, p.r * 0.7, p.r * 1.2, 0, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${lqBg[0]},${lqBg[1]},${lqBg[2]},${dripA})`;
                        ctx.fill();
                    }
                    else if (themeIdxBg === 5) {
                        // ─── GECE: parıldayan yıldızlar + bazıları kayan ───
                        p.twinkle += 0.025 + (p.r * 0.01);
                        let twink = (Math.sin(p.twinkle) + 1) * 0.5;
                        let starA = p.alpha * 2.5 * (0.3 + twink * 0.7);
                        let isFalling = (p.r > 2.5);
                        if (isFalling) {
                            // kayan yıldız
                            p.x += 1.5;
                            p.y += 0.8;
                            if (p.x > canvas.width + 30) {
                                p.x = -30 - Math.random() * 100;
                                p.y = Math.random() * canvas.height * 0.5;
                            }
                            // kuyruk
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p.x - 30, p.y - 15);
                            let tailGrad = ctx.createLinearGradient(p.x, p.y, p.x - 30, p.y - 15);
                            tailGrad.addColorStop(0, `rgba(255,255,255,${starA * 0.9})`);
                            tailGrad.addColorStop(1, `rgba(255,255,255,0)`);
                            ctx.strokeStyle = tailGrad;
                            ctx.lineWidth = 1.2;
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(255,255,255,${starA})`;
                            ctx.fill();
                        } else {
                            // sabit yıldız (sadece parlar)
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.r * 0.5, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(255,255,255,${starA})`;
                            ctx.fill();
                            // çapraz parıltı (büyük yıldızlarda)
                            if (p.r > 1.8 && twink > 0.7) {
                                ctx.strokeStyle = `rgba(255,255,255,${starA * 0.6})`;
                                ctx.lineWidth = 0.5;
                                ctx.beginPath();
                                ctx.moveTo(p.x - p.r * 2, p.y); ctx.lineTo(p.x + p.r * 2, p.y);
                                ctx.moveTo(p.x, p.y - p.r * 2); ctx.lineTo(p.x, p.y + p.r * 2);
                                ctx.stroke();
                            }
                        }
                    }
                }
            }

            // Tema Geçiş Dairesi (Ring)
            for (let i = themeRings.length - 1; i >= 0; i--) {
                let ring = themeRings[i];
                ring.r += 25; // Hızlıca büyü
                ring.alpha -= 0.02; // ~0.5 saniyede solma
                
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, ring.r, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(${Math.round(ring.color[0])}, ${Math.round(ring.color[1])}, ${Math.round(ring.color[2])}, ${ring.alpha})`;
                ctx.lineWidth = 15;
                ctx.stroke();

                if (ring.alpha <= 0) {
                    themeRings[i] = themeRings[themeRings.length - 1];
                    themeRings.pop();
                }
            }

            if (gameState.state === 'GAMEOVER') {
                // Koyu overlay
                ctx.fillStyle = 'rgba(0,0,0,0.78)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let elapsed = (Date.now() - gameOverStartTime) / 1000;
                let slide = Math.min(1, elapsed * 3.5);
                slide = slide < 1 ? 1 - Math.pow(1 - slide, 3) : 1; // ease-out cubic

                let lq = currentTheme.liquid.map(Math.round);
                let cx2 = canvas.width / 2;
                let pX = 35, pW = canvas.width - 70, pH = 520;
                let pY = (canvas.height / 2 - 260) + (1 - slide) * 80;

                // Panel
                ctx.fillStyle = 'rgba(8,18,35,0.95)';
                ctx.beginPath(); ctx.roundRect(pX, pY, pW, pH, 22); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.roundRect(pX, pY, pW, pH, 22); ctx.stroke();

                // Üst renk çizgisi
                let acG = ctx.createLinearGradient(pX, 0, pX + pW, 0);
                acG.addColorStop(0, 'transparent');
                acG.addColorStop(0.3, `rgba(${lq[0]},${lq[1]},${lq[2]},0.9)`);
                acG.addColorStop(0.7, `rgba(${lq[0]},${lq[1]},${lq[2]},0.9)`);
                acG.addColorStop(1, 'transparent');
                ctx.strokeStyle = acG; ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(pX + 22, pY); ctx.lineTo(pX + pW - 22, pY); ctx.stroke();

                ctx.textAlign = 'center';

                // Başlık
                ctx.save();
                ctx.shadowColor = `rgba(${lq[0]},${lq[1]},${lq[2]},0.9)`; ctx.shadowBlur = 22;
                ctx.fillStyle = 'white'; ctx.font = "bold 40px 'Bebas Neue', cursive";
                ctx.fillText('OYUN BİTTİ', cx2, pY + 62);
                ctx.restore();

                ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = "17px 'Bebas Neue', cursive";
                ctx.fillText('Level ' + gameState.level + "'e ulaştın", cx2, pY + 95);

                // Ayraç
                ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(pX+30, pY+115); ctx.lineTo(pX+pW-30, pY+115); ctx.stroke();

                // Skor — animasyonlu sayaç
                let scorePct = Math.min(1, elapsed / 1.5);
                scorePct = scorePct < 1 ? 1 - Math.pow(1 - scorePct, 3) : 1;
                let displayScore = Math.round(scorePct * gameState.score);
                ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = "16px 'Bebas Neue', cursive";
                ctx.fillText('SKOR', cx2, pY + 155);
                ctx.fillStyle = 'white'; ctx.font = "72px 'Bebas Neue', cursive";
                ctx.fillText(displayScore, cx2, pY + 225);

                // High score / Yeni rekor
                if (gameState.isNewHighScore) {
                    let nt = Date.now() / 1000;
                    let nglow = 18 + Math.sin(nt * 5) * 10;
                    let nshimmer = 0.78 + Math.sin(nt * 7) * 0.22;
                    ctx.save();
                    ctx.shadowColor = 'rgba(255,215,0,0.95)'; ctx.shadowBlur = nglow;
                    ctx.fillStyle = `rgba(255,${Math.round(195 + Math.sin(nt*6)*20)},0,${nshimmer})`;
                    ctx.font = "28px 'Bebas Neue', cursive";
                    ctx.fillText('\uD83C\uDFC6 YEN\u0130 REKOR!', cx2, pY + 278);
                    ctx.restore();
                    // Sparkle yıldızlar
                    let sparks = [{x:cx2-115,y:pY+268},{x:cx2+115,y:pY+268},{x:cx2-78,y:pY+254},{x:cx2+78,y:pY+254}];
                    sparks.forEach(function(sp, si) {
                        let ph = nt * 3.5 + si * 1.7;
                        let sa = 0.4 + Math.sin(ph) * 0.5;
                        let ss = 4 + Math.sin(ph * 1.4) * 2;
                        ctx.save();
                        ctx.fillStyle = `rgba(255,230,80,${Math.max(0,sa)})`;
                        ctx.beginPath();
                        for (let pt = 0; pt < 8; pt++) {
                            let ang = (pt / 8) * Math.PI * 2;
                            let rr = pt % 2 === 0 ? ss : ss * 0.38;
                            let sx2 = sp.x + Math.cos(ang) * rr;
                            let sy2 = sp.y + Math.sin(ang) * rr;
                            if (pt === 0) ctx.moveTo(sx2, sy2); else ctx.lineTo(sx2, sy2);
                        }
                        ctx.closePath(); ctx.fill();
                        ctx.restore();
                    });
                } else {
                    ctx.fillStyle = 'rgba(255,215,0,0.65)'; ctx.font = "20px 'Bebas Neue', cursive";
                    ctx.fillText('\uD83C\uDFC6 Rekor: ' + gameState.highScore, cx2, pY + 278);
                }

                // Ayraç 2
                ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(pX+30, pY+305); ctx.lineTo(pX+pW-30, pY+305); ctx.stroke();

                // DEVAM ET butonu (sadece hak kullanılmadıysa)
                let b3Y = pY + 360;
                if (!adSystem.continueUsed) {
                    ctx.fillStyle = 'rgba(50,200,100,0.15)';
                    ctx.beginPath(); ctx.roundRect(pX+20, b3Y-20, pW-40, 40, 20); ctx.fill();
                    ctx.strokeStyle = 'rgba(50,200,100,0.4)'; ctx.lineWidth = 1; ctx.stroke();
                    ctx.fillStyle = 'rgba(100,255,150,0.85)'; ctx.font = "14px 'Bebas Neue', cursive";
                    ctx.fillText('🎥  Reklam izle → +20% Sıvı', cx2, b3Y + 5);
                    btnContinue.y = b3Y; 
                }

                // TEKRAR OYNA butonu — büyük ve parlak
                let b1Y = pY + 415;
                ctx.save();
                // Pulse glow
                let pulseT = Date.now() / 1000;
                let glowSize = 25 + Math.sin(pulseT * 3) * 10;
                ctx.shadowColor = `rgba(${lq[0]},${lq[1]},${lq[2]},0.9)`;
                ctx.shadowBlur = glowSize;
                let bG = ctx.createLinearGradient(0, b1Y-32, 0, b1Y+32);
                bG.addColorStop(0, `rgba(${lq[0]},${lq[1]},${lq[2]},1.0)`);
                bG.addColorStop(1, `rgba(${Math.round(lq[0]*0.5)},${Math.round(lq[1]*0.5)},${Math.round(lq[2]*0.5)},1.0)`);
                ctx.fillStyle = bG;
                ctx.beginPath(); ctx.roundRect(cx2 - 160, b1Y-32, 320, 64, 32); ctx.fill();
                ctx.shadowBlur = 0;
                // Üst parıltı
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.beginPath(); ctx.roundRect(cx2 - 152, b1Y-30, 304, 26, [22,22,0,0]); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = "bold 26px 'Bebas Neue', cursive";
                ctx.fillText('▶  TEKRAR OYNA', cx2, b1Y + 9);
                ctx.restore();
                btnReplay.x = cx2; btnReplay.y = b1Y; btnReplay.w = 320; btnReplay.h = 64; 

                // ANA MENÜ butonu
                let b2Y = pY + 482;
                ctx.fillStyle = 'rgba(255,255,255,0.07)';
                ctx.beginPath(); ctx.roundRect(pX+20, b2Y-24, pW-40, 48, 24); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = "18px 'Bebas Neue', cursive";
                ctx.fillText('ANA MENÜ', cx2, b2Y + 7);
                btnGameOverMenu.y = b2Y; 

                // BAŞARIMLAR — GİZLENDİ (kullanıcı isteğiyle, ileride geri açılabilir)
                if (false && unlockedAchievements.length > 0) {
                    let aY = pY + pH + 18;
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.font = "11px 'Bebas Neue', cursive";
                    ctx.fillText('BAŞARIMLAR', canvas.width/2, aY);
                    let iconSize = 28;
                    let total = unlockedAchievements.length;
                    let startX = canvas.width/2 - (total * (iconSize + 4)) / 2 + iconSize/2;
                    achievementDefs.forEach((def, idx) => {
                        let isUnlocked = unlockedAchievements.includes(def.id);
                        let ax = canvas.width/2 - ((achievementDefs.length * (iconSize+4)) / 2) + idx * (iconSize+4) + iconSize/2;
                        ctx.globalAlpha = isUnlocked ? 1.0 : 0.18;
                        ctx.fillStyle = isUnlocked ? 'rgba(255,215,0,0.15)' : 'rgba(255,255,255,0.05)';
                        ctx.beginPath(); ctx.arc(ax, aY + 20, 13, 0, Math.PI*2); ctx.fill();
                        ctx.font = '16px serif';
                        ctx.fillText(def.icon, ax, aY + 25);
                    });
                    ctx.globalAlpha = 1;
                    ctx.restore();
                }

                requestAnimationFrame(draw);
                return;
            }

            // Oyun Oynanırken veya Durdurulmuşken Ortak Çizimler (Fizik sadece PLAYING ise güncellenir)
            if (gameState.state === 'PLAYING') {
                cameraY += (targetCameraY - cameraY) * 0.1 * dt;
                
                // Alt bardağın hareketi
                if (targetCup.maxSpeed > 0 && !gameState.isTransitioning) {
                    if (targetCup.speed < targetCup.maxSpeed) {
                        targetCup.speed += 0.01 * dt;
                    }
                    targetCup.x += targetCup.speed * targetCup.dir * dt;
                    let halfW = targetCup.w / 2;
                    if (targetCup.x - halfW <= 0) {
                        targetCup.x = halfW;
                        targetCup.dir = 1;
                    } else if (targetCup.x + halfW >= canvas.width) {
                        targetCup.x = canvas.width - halfW;
                        targetCup.dir = -1;
                    }
                }

                // Sürükleme bitince açıyı sıfıra yumuşatarak çek
                // UX: az sıvı varken son damlaları dökmek için bırakınca daha yumuşak düzelir
                // (0.88 → 0.94, daha yavaş düzelme — ~0.5 sn'de dik olur, eskisi ~0.2 sn idi)
                if (isDragging) {
                    topCup.angle += (targetAngle - topCup.angle) * 0.15 * dt;
                } else {
                    targetAngle = 0;
                    topCup.angle *= Math.pow(0.94, dt);
                }

                // Adım 3: Sıvı Akıtma Fiziği
                let rad = topCup.angle * Math.PI / 180;
                let tanVal = Math.min(20, Math.abs(Math.tan(rad)));
                let fillH = (topCup.fill / 100) * topCup.h;
                let sloshFactor = 0.95;
                let isSpilling = tanVal > (topCup.h - fillH) / (topCup.w / 2) * sloshFactor;

                if (isSpilling && topCup.fill > 0 && !gameState.isTransitioning) {
                    let overSpill = Math.min(tanVal - (topCup.h - fillH) / (topCup.w / 2) * sloshFactor, 5);
                    let pourRate = overSpill * 0.6 + 0.5;
                    pourRate = clamp(pourRate, 0.7, 2.5);

                    // Tema viskozitesi: Lav/Bal yavaş, Zehir/Gece hızlı dökülür
                    let _themeIdx = Math.floor((gameState.level - 1) / 5) % themes.length;
                    let viscosity = themes[_themeIdx].viscosity || 1.0;
                    pourRate *= viscosity;
                    
                    topCup.fill -= pourRate;
                    if (topCup.fill < 0) topCup.fill = 0;

                    let isRight = topCup.angle > 0;
                    let localX = isRight ? topCup.w / 2 : -topCup.w / 2;
                    let localY = -topCup.h / 2;
                    // PERFORMANS: sin/cos cache — aynı rad için 2 kez hesaplıyordu
                    let _cosR = Math.cos(rad), _sinR = Math.sin(rad);
                    let worldX = topCup.x + localX * _cosR - localY * _sinR;
                    let worldY = topCup.y + localX * _sinR + localY * _cosR;

                    // Gerçekçi sıvı fırlatma (Parabolik Hız): 45 derecede max uzağa fırlar, 
                    // 90 dereceye yaklaştıkça sıvı fırlamaz, bardağın ağzından dik aşağı dökülür.
                    let absRad = Math.abs(topCup.angle) * Math.PI / 180;
                    let angleFactor = Math.sin(absRad * 2) * 14; 
                    let pVx = (isRight ? 1 : -1) * (angleFactor * 0.07 + pourRate * 0.08);
                    // POOL: yeni obje yerine pool'dan al
                    let _newP = particlePool.getStream();
                    _newP.x = worldX;
                    _newP.y = worldY;
                    _newP.vx = pVx;
                    _newP.vy = -0.3;
                    _newP.size = Math.min(pourRate * 1.5 + 3, 7);
                    _newP.active = true;
                    _newP.amount = pourRate;
                    _newP.dir = isRight ? 1 : -1;
                    streamParticles.push(_newP);
                }

                // Parçacıkları hareket ettir
                for (let i = 0; i < streamParticles.length; i++) {
                    let p = streamParticles[i];
                    if (!p.active) continue;

                    p.vy += 0.4 * dt; // Yerçekimi
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;

                    // Magnet tolerans: hassas kontrol.
                    let magnetTolerance;
                    if (gameState.level <= 3) magnetTolerance = 9;
                    else if (gameState.level <= 8) magnetTolerance = 5;
                    else if (gameState.level <= 15) magnetTolerance = 2;
                    else magnetTolerance = 0;
                    
                    let targetTopY  = targetCup.y - targetCup.h / 2;
                    let targetBotY  = targetCup.y + targetCup.h / 2;
                    let targetLeftX = targetCup.x - targetCup.w / 2 - magnetTolerance;
                    let targetRightX= targetCup.x + targetCup.w / 2 + magnetTolerance;
                    let targetSurfY = targetCup.y + targetCup.h / 2 - (targetCup.fill / 100) * targetCup.h;

                    let goingRight   = p.vx >= 0;
                    let targetOnRight= targetCup.x >= topCup.x;
                    let veryClose    = Math.abs(targetCup.x - topCup.x) < topCup.w * 0.25;
                    let streamTowardTarget = veryClose || (goingRight === targetOnRight);

                    if (!p.overflowing && streamTowardTarget &&
                        p.y >= targetTopY - 2 && p.y <= targetSurfY + 8 &&
                        p.x >= targetLeftX && p.x <= targetRightX) {

                        if (targetCup.fill < 100) {
                            targetCup.fill += p.amount;
                            if (targetCup.fill > 100) targetCup.fill = 100;
                            p.active = false;

                            // Sıvı yüzey Y
                            let surfaceY = targetCup.y + targetCup.h / 2 - (targetCup.fill / 100) * targetCup.h;
                            let lqC = currentTheme.liquid;

                            // Splash parçacıkları — hafif, bardağın içinde kalır
                            let splashCount = 1 + Math.floor(p.amount * 0.8);
                            for (let s = 0; s < splashCount; s++) {
                                let ang = -Math.PI * 0.5 + (Math.random() - 0.5) * Math.PI * 0.5;
                                let spd = 0.8 + Math.random() * 1.4;
                                // Spawn bardağın içinde
                                let sx = clamp(p.x + (Math.random() - 0.5) * 4, targetLeftX + 2, targetRightX - 2);
                                // POOL: splash particle
                                let _sp = particlePool.getSplash();
                                _sp.x = sx;
                                _sp.y = surfaceY;
                                _sp.vx = Math.cos(ang) * spd;
                                _sp.vy = Math.sin(ang) * spd;
                                _sp.alpha = 0.6;
                                _sp.r = 0.8 + Math.random() * 1.2;
                                _sp.color = [lqC[0], lqC[1], lqC[2]];
                                splashParticles.push(_sp);
                            }

                            // Ripple — POOL
                            let _rp = particlePool.getRipple();
                            _rp.x = p.x; _rp.y = surfaceY; _rp.r = 2;
                            _rp.maxR = 8 + p.amount * 2; _rp.alpha = 0.6;
                            ripples.push(_rp);

                            if (Math.random() < 0.3) playSplash();
                            targetCup.waveImpact = Math.min(6, (targetCup.waveImpact || 0) + p.amount * 0.8);

                        } else {
                            // Bardak dolu: sessizce bardağın kenarından kayar, fırlamaz
                            p.overflowing = true;
                            // Hafif yatay itme (sıvının taştığı yön)
                            let spillDir = (p.x < targetCup.x) ? -1 : 1;
                            p.vx = spillDir * (0.8 + Math.random() * 0.6);
                            p.vy = Math.min(p.vy, 1.0); // yukarı fırlatma yok
                        }
                    }

                    if (p.y > canvas.height - cameraY + 20) {
                        // Yere düştü → toplam sıvıdan düş + plob sesi
                        gameState.totalLiquid = Math.max(0, gameState.totalLiquid - p.amount);
                        // Spam önlemek için %30 olasılıkla ses çal
                        if (Math.random() < 0.3) playDropLost();
                        p.active = false;
                    }
                }

                // Temizlik — splice yerine swap-and-pop + pool'a iade
                for(let i = streamParticles.length - 1; i >= 0; i--) {
                    if (!streamParticles[i].active) {
                        particlePool.releaseStream(streamParticles[i]);
                        streamParticles[i] = streamParticles[streamParticles.length - 1];
                        streamParticles.pop();
                    }
                }

                // Level Up / Game Over kontrolü
                // Üst bardak boşalınca kontrol
                if (topCup.fill <= 0 && streamParticles.length === 0 && !gameState.isTransitioning) {
                    // Azıcık sıvı bile girse (> 0) oyun devam etmeli!
                    if (targetCup.fill > 0) {
                        // Level geçişi: toplam sıvı = kalan üst bardak
                        // topCup bitti, targetCup de doldu — geriye kalan hiç değil
                        // Gerçek kalan sıvı = totalLiquid (yere dökülmeyen)
                        levelUp();
                    } else {
                        gameState.state = 'GAMEOVER';
                        gameOverStartTime = Date.now();
                        stopPourSound();
                        stopTiltSound();
                        stopFillNearSound();
                        stopMusic();
                        comboCount = 0; comboMultiplier = 1;
                        playGameOverSound();
                        adSystem.onGameOver();
                        if (gameState.score > gameState.highScore) {
                            gameState.highScore = gameState.score;
                            gameState.isNewHighScore = true;
                            localStorage.setItem('pourDownHighScore', gameState.highScore);
                        } else {
                            gameState.isNewHighScore = false;
                        }
                    }
                }
            } // PLAYING IF END

            // Çizim kısmı (Hem PLAYING hem PAUSED state için ortaktır)
            ctx.save();
            ctx.translate(0, cameraY);
            
            // ── FİZİK TABANLI AKIŞ ANİMASYONU ──
            let drawRad = topCup.angle * Math.PI / 180;
            let drawTanVal = Math.min(20, Math.abs(Math.tan(drawRad)));
            let drawFillH = (topCup.fill / 100) * topCup.h;
            let sloshFactor = 0.95;
            let drawIsSpilling = drawTanVal > (topCup.h - drawFillH) / (topCup.w / 2) * sloshFactor;
            let isSpillingVisually = streamParticles.length > 0 && topCup.fill > 0 && drawIsSpilling;

            // Akan su sesini yönet
            if (isSpillingVisually && gameState.state === 'PLAYING') startPourSound();
            else stopPourSound();

            if (pourNoiseNode && pourNoiseNode.setIntensity) {
                pourNoiseNode.setIntensity(Math.min(1, Math.abs(topCup.angle) / 75));
            }

            // ─── TİLT SESİ (bardak eğilirken cam sürtünme) ───
            if (gameState.state === 'PLAYING' && Math.abs(topCup.angle) > 5 && !isSpillingVisually) {
                startTiltSound();
                setTiltIntensity(Math.min(1, Math.abs(topCup.angle) / 75));
            } else {
                stopTiltSound();
            }

            // ─── FİLL-NEAR SESİ (alt bardak %85+ olunca gerilim) ───
            if (gameState.state === 'PLAYING' && targetCup.fill >= 85 && targetCup.fill < 100) {
                startFillNearSound();
            } else {
                stopFillNearSound();
            }

            // ─── KALP ATIŞI (sıvı bitmek üzere) ───
            if (gameState.state === 'PLAYING' && gameState.totalLiquid < 30 && gameState.totalLiquid > 0) {
                heartbeatTimer -= dt;
                if (heartbeatTimer <= 0) {
                    playHeartbeat();
                    // sıvı azaldıkça ritim hızlanır: 30→90 frame, 0→30 frame
                    heartbeatTimer = 30 + (gameState.totalLiquid / 30) * 60;
                }
            }

            // ─── AMBIENT MÜZİK ───
            if (gameState.state === 'PLAYING' || gameState.state === 'MENU') {
                startMusic();
                tickMusic();
            } else if (gameState.state === 'GAMEOVER') {
                stopMusic();
            }

            // ── ŞERİT (POLYLINE) ÇİZİMİ ──
            // Görsel akış dursa bile, havadaki parçacıkları çizmeye devam et!
            let activeStreams = streamParticles.filter(p => p.active);
            
            if (activeStreams.length > 0) {
                let drawAbsAngle = Math.abs(topCup.angle);
                let pourStrength = clamp((drawAbsAngle - 35) / 45, 0, 1);
                let flowQ = currentTheme.liquid.map(Math.round);
                
                // Parçacıkları Y'ye göre sırala (yukarıdan aşağı)
                let sorted = activeStreams.sort((a, b) => a.y - b.y);
                
                // Kopuk akışları (farklı dökme anlarını) ayrı ayrı çizmek için grupla
                let segments = [];
                let currentSeg = [sorted[0]];
                for (let i = 1; i < sorted.length; i++) {
                    if (sorted[i].y - sorted[i-1].y > 35) { // 35px boşluk varsa akış kopmuştur
                        segments.push(currentSeg);
                        currentSeg = [sorted[i]];
                    } else {
                        currentSeg.push(sorted[i]);
                    }
                }
                segments.push(currentSeg);

                // Her bir akış grubunu ayrı çiz (birleşip saçma şekiller oluşturmasın)
                for (let seg of segments) {
                    if (seg.length >= 2) {
                        let topW = 4 + pourStrength * 6;
                        let botW = 2.5;  // Eski 1.5'tan arttırıldı - alt uç sivri/kesik görünmesin
                        
                        ctx.save();
                        ctx.shadowColor = `rgba(${flowQ[0]},${flowQ[1]},${flowQ[2]},0.6)`;
                        ctx.shadowBlur = 8 * _shadowScale;  // PERF: mobilde yarıya iner
                        
                        ctx.beginPath();
                        // Sol kenar
                        for (let i = 0; i < seg.length; i++) {
                            let p = seg[i];
                            let t = i / (seg.length - 1);
                            let w = topW + (botW - topW) * t;
                            if (i === 0) ctx.moveTo(p.x - w/2, p.y);
                            else ctx.lineTo(p.x - w/2, p.y);
                        }
                        // Sağ kenar
                        for (let i = seg.length - 1; i >= 0; i--) {
                            let p = seg[i];
                            let t = i / (seg.length - 1);
                            let w = topW + (botW - topW) * t;
                            ctx.lineTo(p.x + w/2, p.y);
                        }
                        ctx.closePath();
                        
                        let firstP = seg[0];
                        let lastP = seg[seg.length - 1];
                        let sg = ctx.createLinearGradient(0, firstP.y, 0, lastP.y);
                        sg.addColorStop(0, `rgba(${flowQ[0]},${flowQ[1]},${flowQ[2]},0.95)`);
                        sg.addColorStop(1, `rgba(${flowQ[0]},${flowQ[1]},${flowQ[2]},0.55)`);  // Eski 0.4 - alt uç daha görünür kalsın, kesik hissi azalır
                        ctx.fillStyle = sg;
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(seg[0].x, seg[0].y);
                        for (let i = 1; i < seg.length; i++) {
                            ctx.lineTo(seg[i].x, seg[i].y);
                        }
                        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        ctx.restore();

                        // Yavaş akışta damla kopması (sadece en son parçadan)
                        if (!window.streamDrops) window.streamDrops = [];
                        if (isSpillingVisually && pourStrength < 0.5 && Math.random() < 0.3 && seg === segments[segments.length-1]) {
                            window.streamDrops.push({
                                x: lastP.x + (Math.random() - 0.5) * 5,
                                y: lastP.y,
                                vx: (Math.random() - 0.5) * 1.0,
                                vy: 1.5 + Math.random() * 2.0,
                                r: 1.5 + Math.random() * 2.0,
                                alpha: 0.82,
                                color: [flowQ[0], flowQ[1], flowQ[2]]
                            });
                        }
                    } else if (seg.length === 1) {
                        let p = seg[0];
                        let spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                        let st  = Math.min(spd * 0.3, 3.5);
                        ctx.beginPath();
                        ctx.ellipse(p.x, p.y, p.size*0.9, p.size*0.9 + st, Math.atan2(p.vy, p.vx) - Math.PI/2, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(${flowQ[0]},${flowQ[1]},${flowQ[2]},0.82)`;
                        ctx.fill();
                        ctx.beginPath();
                        ctx.ellipse(p.x - p.size*0.25, p.y - p.size*0.35, p.size*0.28, p.size*0.28, 0, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255,255,255,0.3)`;
                        ctx.fill();
                    }
                }
            }

            if (isSpillingVisually) {
                // Başarım: ilk defa döküyorsa
                checkAchievements('pour_start', null);
            }

            // Tema renkli damlaları (kopan küçük damlalar) güncelle ve çiz
            if (!window.streamDrops) window.streamDrops = [];
            for (let i = window.streamDrops.length - 1; i >= 0; i--) {
                let d = window.streamDrops[i];
                d.y  += d.vy * dt;
                d.vy += 0.25 * dt;
                d.x  += d.vx * dt;
                d.alpha -= 0.028 * dt;
                if (d.alpha <= 0) {
                    window.streamDrops[i] = window.streamDrops[window.streamDrops.length - 1];
                    window.streamDrops.pop();
                    continue;
                }
                let dq = d.color.map(Math.round);
                let stretch = Math.min(d.vy * 0.35, 2.5);
                ctx.beginPath();
                ctx.ellipse(d.x, d.y, d.r, d.r + stretch, 0, 0, Math.PI*2);
                ctx.fillStyle = `rgba(${dq[0]},${dq[1]},${dq[2]},${d.alpha})`;
                ctx.fill();
                // İç parıltı
                ctx.beginPath();
                ctx.ellipse(d.x - d.r*0.2, d.y - d.r*0.3, d.r*0.3, d.r*0.3, 0, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${d.alpha*0.4})`;
                ctx.fill();
            }

            // --- SPLASH PARÇACIKLARı ---
            for (let i = splashParticles.length - 1; i >= 0; i--) {
                let s = splashParticles[i];
                s.vy += 0.38 * dt; // yerçekimi
                s.x += s.vx * dt;
                s.y += s.vy * dt;
                s.vx *= Math.pow(0.97, dt); // hava direnci
                s.alpha -= 0.042 * dt;
                if (s.alpha <= 0) {
                    particlePool.releaseSplash(s);
                    splashParticles[i] = splashParticles[splashParticles.length - 1];
                    splashParticles.pop();
                    continue;
                }
                let sq = s.color.map(Math.round);
                ctx.beginPath();
                // Düşerken uzayan damla efekti
                let speed = Math.sqrt(s.vx*s.vx + s.vy*s.vy);
                let stretch = Math.min(speed * 0.4, 3);
                ctx.ellipse(s.x, s.y, s.r, s.r + stretch, Math.atan2(s.vy, s.vx) - Math.PI/2, 0, Math.PI*2);
                ctx.fillStyle = `rgba(${sq[0]},${sq[1]},${sq[2]},${s.alpha})`;
                ctx.fill();
            }

            // --- RIPPLE HALKALARI ---
            for (let i = ripples.length - 1; i >= 0; i--) {
                let rip = ripples[i];
                rip.r += ((rip.maxR - rip.r) * 0.15 + 0.5) * dt;
                rip.alpha -= 0.055 * dt;
                if (rip.alpha <= 0) {
                    particlePool.releaseRipple(rip);
                    ripples[i] = ripples[ripples.length - 1];
                    ripples.pop();
                    continue;
                }
                ctx.beginPath();
                // Yatay elips: sıvı yüzeyinde perspektif hissi
                ctx.ellipse(rip.x, rip.y, rip.r, rip.r * 0.28, 0, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(255,255,255,${rip.alpha})`;
                ctx.lineWidth = 1.2;
                ctx.stroke();
                // Sıvı renkli iç halka
                let rq = currentTheme.liquid.map(Math.round);
                ctx.beginPath();
                ctx.ellipse(rip.x, rip.y, rip.r * 0.5, rip.r * 0.14, 0, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(${rq[0]},${rq[1]},${rq[2]},${rip.alpha * 0.5})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            drawCup(targetCup);
            drawCup(topCup);
            
            // TAMAMLAMA EFEKTLERİ (En üstte çizilir)
            ctx.lineCap = 'round';
            
            // 3. Işık Huzmeleri
            for (let i = burstLines.length - 1; i >= 0; i--) {
                let p = burstLines[i];
                p.y += p.vy * dt;
                p.alpha -= 0.04 * dt;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + p.h);
                ctx.strokeStyle = `rgba(${Math.round(p.color[0])}, ${Math.round(p.color[1])}, ${Math.round(p.color[2])}, ${p.alpha})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                if (p.alpha <= 0) {
                    particlePool.releaseBurst(p);
                    burstLines[i] = burstLines[burstLines.length - 1];
                    burstLines.pop();
                }
            }

            // 4. Parçacık Patlaması
            for (let i = explosionParticles.length - 1; i >= 0; i--) {
                let p = explosionParticles[i];
                p.vy += 0.3 * dt; // Yerçekimi
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.alpha -= 0.04 * dt;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(${Math.round(p.color[0])}, ${Math.round(p.color[1])}, ${Math.round(p.color[2])}, ${p.alpha})`;
                ctx.fill();
                if (p.alpha <= 0) {
                    particlePool.releaseExplosion(p);
                    explosionParticles[i] = explosionParticles[explosionParticles.length - 1];
                    explosionParticles.pop();
                }
            }

            // 5. +SKOR Yazısı
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let p = floatingTexts[i];
                p.y -= 2 * dt; // Uçuş hızı
                p.alpha -= 0.02 * dt;
                ctx.fillStyle = `rgba(255, 215, 0, ${p.alpha})`; // Altın
                ctx.font = "bold 36px 'Bebas Neue', cursive";
                ctx.textAlign = 'center';
                ctx.shadowColor = `rgba(255, 215, 0, ${p.alpha * 0.5})`;
                ctx.shadowBlur = 10 * _shadowScale;  // PERF: mobilde yarıya iner
                ctx.fillText(p.text, p.x, p.y);
                ctx.shadowBlur = 0; // Sıfırla
                if (p.alpha <= 0) {
                    particlePool.releaseFloat(p);
                    floatingTexts[i] = floatingTexts[floatingTexts.length - 1];
                    floatingTexts.pop();
                }
            }

            ctx.restore();

            // --- TUTORIAL HİNTİ (Level 1) ---
            if (gameState.level === 1 && tutorialTimer > 0 && !gameState.isTransitioning) {
                // Eğim başlayınca hızla söner
                if (Math.abs(topCup.angle) > 8) tutorialTimer = Math.min(tutorialTimer, 45);
                tutorialTimer--;
                let tAlpha = Math.min(1, tutorialTimer / 40);

                let hx = canvas.width / 2;
                let hy = topCup.y - topCup.h / 2 - 50;
                let bounce = Math.sin(Date.now() * 0.004) * 5;

                ctx.save();
                ctx.globalAlpha = tAlpha;
                ctx.textAlign = 'center';

                // Sol ok
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = "bold 26px 'Bebas Neue', cursive";
                ctx.fillText('←', hx - 55 + bounce, hy);

                // İpucu yazısı
                ctx.fillStyle = 'rgba(255,255,255,0.75)';
                ctx.font = "14px 'Bebas Neue', cursive";
                ctx.fillText('Sürükle', hx, hy + 1);

                // Sağ ok
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = "bold 26px 'Bebas Neue', cursive";
                ctx.fillText('→', hx + 55 - bounce, hy);

                ctx.fillStyle = 'rgba(255,255,255,0.45)';
                ctx.font = "12px 'Bebas Neue', cursive";
                ctx.fillText('bardağı eğilt, sıvıyı dök', hx, hy + 20);
                ctx.restore();
            }

            // --- OYUN İÇİ HUD (Level & Skor) ---
            let hudY = 30;
            let hudH = 32;
            let lqHUD = currentTheme.liquid.map(Math.round);

            // 1. Level Badge (Sol)
            let lvlX = 18;
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath(); ctx.roundRect(lvlX, hudY - 14, 85, hudH, 6); ctx.fill();
            ctx.strokeStyle = `rgba(${lqHUD[0]},${lqHUD[1]},${lqHUD[2]},0.4)`;
            ctx.lineWidth = 1.5; ctx.stroke();
            // Accent line
            ctx.fillStyle = `rgba(${lqHUD[0]},${lqHUD[1]},${lqHUD[2]},0.8)`;
            ctx.fillRect(lvlX, hudY - 14, 3, hudH);
            
            ctx.fillStyle = 'white'; ctx.font = "bold 14px 'Bebas Neue', cursive"; ctx.textAlign = 'left';
            ctx.fillText('LEVEL ' + gameState.level, lvlX + 10, hudY + 7);
            ctx.restore();

            // 2. Score Badge (Orta)
            let scrW = 100;
            let scrX = canvas.width / 2 - scrW / 2;
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath(); ctx.roundRect(scrX, hudY - 14, scrW, hudH, 6); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.stroke();
            // Puan parlaması (üstten ince çizgi)
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.fillRect(scrX + 5, hudY - 12, scrW - 10, 1);

            ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = "11px 'Bebas Neue', cursive"; ctx.textAlign = 'center';
            ctx.fillText('SKOR', canvas.width/2, hudY - 1);
            // Skor zıplama animasyonu
            window.scorePulse = window.scorePulse || 1;
            window.scorePulse += (1 - window.scorePulse) * 0.15;
            ctx.save();
            ctx.translate(canvas.width/2, hudY + 14);
            ctx.scale(window.scorePulse, window.scorePulse);
            ctx.fillStyle = window.scorePulse > 1.05 ? '#ffd700' : 'white';
            ctx.font = "bold 18px 'Bebas Neue', cursive";
            ctx.fillText(gameState.score, 0, 0);
            ctx.restore();
            ctx.restore();

            // 3. Kombo Rozeti (Sağ üst) — sadece kombo varken görünür
            // Pause butonu sağ üstte (x=350, r=20 → 330-370 arası), combo rozetini pause'un soluna koyarız
            if (comboCount >= 2) {
                let ct = Date.now() / 1000;
                let pulse = 0.85 + Math.sin(ct * 6) * 0.15;
                let cbX = canvas.width - 60;  // pause butonunun 40px solu - artık çakışmıyor
                let cbColors = comboCount >= 5 ? [255,80,80] : comboCount >= 3 ? [255,160,20] : [255,215,0];
                let cbLabel = comboCount >= 5 ? '🔥' : comboCount >= 3 ? '⚡' : '✨';
                ctx.save();
                ctx.globalAlpha = pulse;
                ctx.fillStyle = `rgba(${cbColors[0]},${cbColors[1]},${cbColors[2]},0.18)`;
                ctx.beginPath(); ctx.roundRect(cbX - 68, hudY - 14, 70, hudH, 6); ctx.fill();
                ctx.strokeStyle = `rgba(${cbColors[0]},${cbColors[1]},${cbColors[2]},0.7)`;
                ctx.lineWidth = 1.5; ctx.stroke();
                ctx.fillStyle = `rgb(${cbColors[0]},${cbColors[1]},${cbColors[2]})`;
                ctx.font = "bold 13px 'Bebas Neue', cursive"; ctx.textAlign = 'right';
                ctx.fillText(`${cbLabel} x${comboMultiplier}`, cbX - 4, hudY + 8);
                ctx.restore();
            }

            // --- SIVI HUD ÇUBUĞU — Alt Bardak Dolum İlerlemesi ---
            {
                let bX = 14, bY = 80, bW = 12, bH = 180;
                // targetCup.fill: alt bardağın doluluk oranı (0-100)
                let liqPct = clamp(gameState.totalLiquid / 100, 0, 1);
                let lq = currentTheme.liquid.map(Math.round);
                let isLow = gameState.totalLiquid < 20;
                let t = Date.now();

                // Arka plan
                ctx.fillStyle = 'rgba(0,0,0,0.45)';
                ctx.beginPath();
                ctx.roundRect(bX, bY, bW, bH, bW / 2);
                ctx.fill();

                // Dolum (clip ile yuvarlatma)
                if (liqPct > 0) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.roundRect(bX, bY, bW, bH, bW / 2);
                    ctx.clip();
                    let fillH = bH * liqPct;
                    let fillY = bY + bH - fillH;
                    let barGrad = ctx.createLinearGradient(0, fillY, 0, bY + bH);
                    if (isLow) {
                        barGrad.addColorStop(0, 'rgba(255,80,80,0.95)');
                        barGrad.addColorStop(1, 'rgba(180,20,20,0.8)');
                    } else {
                        barGrad.addColorStop(0, `rgba(${lq[0]},${lq[1]},${lq[2]},1)`);
                        barGrad.addColorStop(1, `rgba(${lq[0]},${lq[1]},${lq[2]},0.5)`);
                    }
                    ctx.fillStyle = barGrad;
                    ctx.fillRect(bX, fillY, bW, fillH);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.fillRect(bX + 2, fillY + 2, 3, Math.max(0, fillH - 4));
                    ctx.restore();
                }

                // Kenar
                let borderAlpha = isLow ? 0.45 + Math.sin(t * 0.01) * 0.3 : 0.25;
                ctx.strokeStyle = isLow ? `rgba(255,100,100,${borderAlpha})` : 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.roundRect(bX, bY, bW, bH, bW / 2);
                ctx.stroke();

                // Yüzde / etiket
                ctx.fillStyle = isLow ? 'rgba(255,120,120,0.9)' : 'rgba(255,255,255,0.5)';
                ctx.font = "10px 'Bebas Neue', cursive";
                ctx.textAlign = 'center';
                ctx.fillText(Math.round(gameState.totalLiquid) + '%', bX + bW / 2, bY + bH + 14);

                // Low liquid warning vignette
                if (isLow) {
                    let warnAlpha = 0.06 + Math.sin(Date.now() * 0.015) * 0.05;
                    let warnGrad = ctx.createRadialGradient(0, canvas.height/2, 0, 0, canvas.height/2, 180);
                    warnGrad.addColorStop(0, `rgba(220,30,30,${warnAlpha * 2})`);
                    warnGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = warnGrad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                        }

            // UI - Pause Butonu
            ctx.beginPath();
            ctx.arc(btnPause.x, btnPause.y, btnPause.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.fillRect(btnPause.x - 6, btnPause.y - 6, 4, 12);
            ctx.fillRect(btnPause.x + 2, btnPause.y - 6, 4, 12);

            if (gameState.state === 'PAUSED') {
                // Koyu overlay (GameOver ile aynı)
                ctx.fillStyle = 'rgba(0,0,0,0.78)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                let lqP = currentTheme.liquid.map(Math.round);
                let cx3 = canvas.width / 2;
                let pX = 55, pW = canvas.width - 110, pH = 370;
                let pY = canvas.height / 2 - pH / 2;

                // Panel
                ctx.fillStyle = 'rgba(8,18,35,0.95)';
                ctx.beginPath(); ctx.roundRect(pX, pY, pW, pH, 22); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.roundRect(pX, pY, pW, pH, 22); ctx.stroke();

                // Üst renk çizgisi (tema rengi)
                let acG2 = ctx.createLinearGradient(pX, 0, pX + pW, 0);
                acG2.addColorStop(0, 'transparent');
                acG2.addColorStop(0.3, `rgba(${lqP[0]},${lqP[1]},${lqP[2]},0.9)`);
                acG2.addColorStop(0.7, `rgba(${lqP[0]},${lqP[1]},${lqP[2]},0.9)`);
                acG2.addColorStop(1, 'transparent');
                ctx.strokeStyle = acG2; ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(pX + 22, pY); ctx.lineTo(pX + pW - 22, pY); ctx.stroke();

                ctx.textAlign = 'center';

                // Başlık
                ctx.save();
                ctx.shadowColor = `rgba(${lqP[0]},${lqP[1]},${lqP[2]},0.8)`; ctx.shadowBlur = 18;
                ctx.fillStyle = 'white'; ctx.font = "bold 32px 'Bebas Neue', cursive";
                ctx.fillText('DURAKLATILDI', cx3, pY + 58);
                ctx.restore();

                // Level / Skor bilgisi
                ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = "15px 'Bebas Neue', cursive";
                ctx.fillText('Level ' + gameState.level + '  •  Skor: ' + gameState.score, cx3, pY + 90);

                // Ayraç
                ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(pX+20, pY+108); ctx.lineTo(pX+pW-20, pY+108); ctx.stroke();

                // DEVAM ET butonu
                let r1Y = pY + 155;
                let rG = ctx.createLinearGradient(0, r1Y-28, 0, r1Y+28);
                rG.addColorStop(0, `rgba(${lqP[0]},${lqP[1]},${lqP[2]},0.95)`);
                rG.addColorStop(1, `rgba(${Math.round(lqP[0]*0.55)},${Math.round(lqP[1]*0.55)},${Math.round(lqP[2]*0.55)},0.95)`);
                ctx.fillStyle = rG;
                ctx.beginPath(); ctx.roundRect(pX+16, r1Y-26, pW-32, 52, 26); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = "bold 20px 'Bebas Neue', cursive";
                ctx.fillText('▶  DEVAM ET', cx3, r1Y + 7);
                btnResume.y = r1Y;

                // TEKRAR OYNA butonu (yeni)
                let rrY = pY + 215;
                ctx.fillStyle = 'rgba(255,180,80,0.13)';
                ctx.beginPath(); ctx.roundRect(pX+16, rrY-22, pW-32, 44, 22); ctx.fill();
                ctx.strokeStyle = 'rgba(255,180,80,0.5)'; ctx.lineWidth = 1.2; ctx.stroke();
                ctx.fillStyle = 'rgba(255,210,120,1)'; ctx.font = "17px 'Bebas Neue', cursive";
                ctx.fillText('🔄  TEKRAR OYNA', cx3, rrY + 6);

                // ANA MENÜ butonu
                let r2Y = pY + 270;
                ctx.fillStyle = 'rgba(255,255,255,0.07)';
                ctx.beginPath(); ctx.roundRect(pX+16, r2Y-22, pW-32, 44, 22); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = "17px 'Bebas Neue', cursive";
                ctx.fillText('🏠  ANA MENÜ', cx3, r2Y + 6);

                // SES + MÜZİK TOGGLE BUTONLARI
                let togY = pY + pH - 36;
                let toggleR = 22;
                let togSoundX = cx3 - 38;
                let togMusicX = cx3 + 38;

                // Ses toggle
                ctx.beginPath();
                ctx.arc(togSoundX, togY, toggleR, 0, Math.PI*2);
                ctx.fillStyle = gameState.soundEnabled ? `rgba(${lqP[0]},${lqP[1]},${lqP[2]},0.22)` : 'rgba(255,255,255,0.05)';
                ctx.fill();
                ctx.strokeStyle = gameState.soundEnabled ? `rgba(${lqP[0]},${lqP[1]},${lqP[2]},0.7)` : 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1.5; ctx.stroke();
                ctx.fillStyle = 'white'; ctx.font = "18px 'Bebas Neue', cursive"; ctx.textAlign = 'center';
                ctx.fillText(gameState.soundEnabled ? '🔊' : '🔇', togSoundX, togY + 6);

                // Müzik toggle
                ctx.beginPath();
                ctx.arc(togMusicX, togY, toggleR, 0, Math.PI*2);
                ctx.fillStyle = gameState.musicEnabled ? `rgba(${lqP[0]},${lqP[1]},${lqP[2]},0.22)` : 'rgba(255,255,255,0.05)';
                ctx.fill();
                ctx.strokeStyle = gameState.musicEnabled ? `rgba(${lqP[0]},${lqP[1]},${lqP[2]},0.7)` : 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1.5; ctx.stroke();
                ctx.fillStyle = 'white';
                ctx.fillText('🎵', togMusicX, togY + 6);
                if (!gameState.musicEnabled) {
                    ctx.strokeStyle = 'rgba(255,80,80,0.95)';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(togMusicX - 13, togY - 13);
                    ctx.lineTo(togMusicX + 13, togY + 13);
                    ctx.stroke();
                }

                // Buton pozisyonları kaydet
                btnResume.x = cx3; btnResume.y = r1Y; btnResume.w = pW-32; btnResume.h = 52;
                btnReplayPause = { x: cx3, y: rrY, w: pW-32, h: 44 };
                btnMainMenu.x = cx3; btnMainMenu.y = r2Y; btnMainMenu.w = pW-32; btnMainMenu.h = 44;
                btnSoundToggle = { x: togSoundX, y: togY, r: toggleR };
                btnMusicToggle = { x: togMusicX, y: togY, r: toggleR };
            }

            // ─── TEMA GEÇİŞİ FLASH + İSİM (İYİLEŞTİRİLMİŞ) ───
            // Önceki: düz beyaz flash → şimdi: tema renginde radial flash (daha tematik)
            if (themeFlashTimer > 0) {
                let lqF = currentTheme.liquid.map(Math.round);
                // Tema rengiyle hafif gradient flash (radial, kenarlar daha yoğun)
                let progress = themeFlashTimer / 60;
                let alpha = progress * 0.35;  // beyazdan daha yumuşak
                // İç katman: tema rengi
                ctx.fillStyle = `rgba(${lqF[0]},${lqF[1]},${lqF[2]},${alpha * 0.6})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // Üst katman: hafif beyaz (vintage flash hissi)
                ctx.fillStyle = `rgba(255,255,255,${alpha * 0.25})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                themeFlashTimer--;
            }
            if (themeAnnounceTimer > 0 && themeAnnounceData) {
                let t = themeAnnounceTimer;
                // Daha smooth easing — ease-out cubic
                let progress = (120 - t) / 120;
                let alpha = t > 90 ? (120 - t) / 30 : (t < 30 ? t / 30 : 1);
                // Scale: gelirken büyür, sonra hafif "pop" effect
                let scale;
                if (t > 100) {
                    let p = (120 - t) / 20;  // 0..1
                    scale = 0.5 + p * 0.65;  // 0.5'ten 1.15'e büyür
                } else if (t > 85) {
                    let p = (100 - t) / 15;  // 0..1
                    scale = 1.15 - p * 0.15;  // 1.15'ten 1.0'a iner (bounce hissi)
                } else {
                    scale = 1.0;
                }
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(canvas.width / 2, canvas.height / 2 - 60);
                ctx.scale(scale, scale);
                
                let lq = currentTheme.liquid.map(Math.round);
                
                // YENİ: Dış glow halkası (sadece banner'da, performans için sınırlı)
                if (!_isMobile || t > 30) {  // mobilde sadece pik anlarda
                    ctx.shadowColor = `rgba(${lq[0]},${lq[1]},${lq[2]},0.7)`;
                    ctx.shadowBlur = 20 * _shadowScale;
                }
                
                // Arka plan paneli (daha şık - gradient hissi için 2 katman)
                ctx.fillStyle = `rgba(${lq[0]},${lq[1]},${lq[2]},0.25)`;
                ctx.beginPath(); ctx.roundRect(-130, -42, 260, 84, 16); ctx.fill();
                // İç hafif aydınlatma
                ctx.fillStyle = `rgba(255,255,255,0.08)`;
                ctx.beginPath(); ctx.roundRect(-126, -38, 252, 36, [14,14,4,4]); ctx.fill();
                
                ctx.shadowBlur = 0;  // glow reset
                
                // Çerçeve
                ctx.strokeStyle = `rgba(${lq[0]},${lq[1]},${lq[2]},0.95)`;
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.roundRect(-130, -42, 260, 84, 16); ctx.stroke();
                
                // İkon (hafif sallanma efekti - canlılık verir)
                let iconBob = Math.sin((120 - t) * 0.3) * 1.5;
                ctx.font = '38px serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = 'white';
                ctx.fillText(themeAnnounceData.icon, 0, -2 + iconBob);
                
                // İsim
                ctx.font = "bold 22px 'Bebas Neue', cursive";
                ctx.fillStyle = `rgb(${lq[0]},${lq[1]},${lq[2]})`;
                // İsim altında ince çizgi (vurgu)
                ctx.fillText(themeAnnounceData.name + ' MODU', 0, 28);
                
                ctx.restore();
                themeAnnounceTimer--;
            }

            // ─── COMBO POPUPS RENDER ───
            for (let i = comboPopups.length - 1; i >= 0; i--) {
                let cp = comboPopups[i];
                cp.timer--;
                cp.scale += (1 - cp.scale) * 0.1;
                let yOffset = (100 - cp.timer) * cp.vy;
                let alpha = cp.timer > 80 ? (100 - cp.timer) / 20 : (cp.timer < 20 ? cp.timer / 20 : 1);
                if (cp.timer <= 0) {
                    comboPopups[i] = comboPopups[comboPopups.length - 1];
                    comboPopups.pop();
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(canvas.width/2, canvas.height/2 - 40 + yOffset);
                let popScale = cp.timer > 90 ? 1.5 - (cp.timer - 90) * 0.05 : 1;
                ctx.scale(popScale, popScale);
                ctx.shadowColor = `rgba(${cp.color[0]},${cp.color[1]},${cp.color[2]},0.8)`;
                ctx.shadowBlur = 25;
                ctx.fillStyle = `rgb(${cp.color[0]},${cp.color[1]},${cp.color[2]})`;
                ctx.font = "bold 38px 'Bebas Neue', cursive";
                ctx.textAlign = 'center';
                ctx.fillText(cp.text, 0, 0);
                if (cp.subtext) {
                    ctx.shadowBlur = 0;
                    ctx.font = "16px 'Bebas Neue', cursive";
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.fillText(cp.subtext, 0, 24);
                }
                ctx.restore();
            }

            // Toast bildirimi (tüm state'lerde üstte göster)
            if (gameState.state !== 'MENU') drawToast();

            // ─── DEBUG FPS Overlay ───
            // Aktivasyon: localStorage.setItem('pourDownDebug','true') sonra sayfa yenile
            if (localStorage.getItem('pourDownDebug') === 'true') {
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(canvas.width - 90, canvas.height - 38, 80, 28);
                ctx.fillStyle = _currentFps >= 55 ? '#7CFC00' : (_currentFps >= 40 ? '#FFD700' : '#FF4500');
                ctx.font = "bold 14px monospace";
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText(_currentFps + ' FPS', canvas.width - 80, canvas.height - 24);
                ctx.restore();
            }

            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);
    </script>
</body>
</html>
